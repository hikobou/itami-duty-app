<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>伊丹市交通局 勤番検索</title>
<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white}
.shell{max-width:900px;margin:auto;padding:20px}
input,button{padding:12px;border-radius:10px;border:none}
button{background:#2563eb;color:white;font-weight:bold}
.card{background:white;color:black;border-radius:16px;padding:16px;margin-top:16px}
</style>
</head>
<body>
<div class="shell">
<h1>勤務検索</h1>
<input id="input" placeholder="例:222" />
<button onclick="search()">検索</button>
<div id="result" class="card" style="display:none"></div>
</div>
<script>
const db={"222":{出勤:"6:34",退勤:"19:51"}};
function search(){
const v=document.getElementById('input').value;
const d=db[v];
if(!d)return alert('なし');
const r=document.getElementById('result');
r.style.display='block';
r.innerHTML=`出勤:${d.出勤}<br>退勤:${d.退勤}`;
}
</script>
</body>
</html>
