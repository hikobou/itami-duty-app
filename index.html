<!DOCTYPE html>
<html lang="ja">
<head>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伊丹市交通局 勤番検索</title>
<style>
:root{
  --bg:#0d241b;
  --bg2:#0a1a14;
  --panel:#163629;
  --panel2:#1a4031;
  --panel3:#204c3b;
  --accent:#2aa876;
  --accent-strong:#39c48d;
  --line:#2a5f4c;
  --line-soft:rgba(255,255,255,0.06);
  --text:#e8f5ef;
  --muted:#9fc5b5;
  --danger:#dc2626;
  --warn:#d97706;
  --info:#2563eb;
  --ok:#15803d;
  --shadow:0 20px 40px rgba(0,0,0,0.18);
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:"Noto Sans JP",sans-serif;
  background:linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--text);
}
.container{
  max-width:940px;
  margin:0 auto;
  padding:20px 16px 40px;
}
.hero{
  background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));
  border:1px solid var(--line);
  border-radius:16px;
  padding:18px;
  box-shadow:var(--shadow);
  margin-bottom:16px;
}
.hero-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
}
.header{
  font-size:30px;
  font-weight:800;
  letter-spacing:0.04em;
  line-height:1.2;
  margin-bottom:6px;
  font-family:"Orbitron","Noto Sans JP",sans-serif;
}
.header .line2{
  display:block;
  font-size:36px;
  font-weight:800;
  letter-spacing:0.08em;
}
.sub{
  font-size:12px;
  color:var(--muted);
  margin:0;
}
.system-badge{
  border:1px solid var(--line);
  background:rgba(255,255,255,0.03);
  border-radius:10px;
  padding:10px 12px;
  min-width:132px;
}
.system-badge-title{
  font-size:10px;
  color:var(--muted);
  letter-spacing:0.08em;
  margin-bottom:4px;
}
.system-badge-value{
  font-family:"JetBrains Mono",monospace;
  font-size:18px;
  font-weight:700;
}
.toolbar{
  display:grid;
  grid-template-columns:180px 1fr 92px;
  gap:10px;
  margin-top:16px;
}
.mode-toggle{
  display:flex;
  border:1px solid var(--line);
  border-radius:10px;
  overflow:hidden;
  background:rgba(255,255,255,0.02);
}
.mode-toggle button{
  flex:1;
  padding:12px;
  background:transparent;
  border:none;
  color:var(--muted);
  font-size:14px;
  cursor:pointer;
  font-weight:700;
}
.mode-toggle button.active{
  background:var(--accent);
  color:#fff;
}
#weekdayBtn.active{
  background:#2563eb;
  color:#fff;
}

#holidayBtn.active{
  background:#f472b6;
}

.search-box{
  display:flex;
  gap:10px;
}
.search-box input{
  flex:1;
  height:46px;
  padding:0 14px;
  border-radius:10px;
  border:1px solid #d1d5db;
  background:#ffffff;
  color:#111827;
  font-size:17px;
  font-family:"JetBrains Mono",monospace;
  font-weight:700;
}
.search-box input::placeholder{color:#9ca3af;}
.search-box input:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(42,168,118,0.15);
}
.search-box button,
.action-btn{
  height:46px;
  padding:0 16px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:#fff;
  font-weight:700;
  cursor:pointer;
}
.action-btn{
  background:var(--panel3);
  border:1px solid var(--line);
}
.result-headline{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:16px 2px 8px;
}
.result-title{
  font-size:13px;
  color:var(--muted);
  letter-spacing:0.08em;
}
.result-status{
  font-size:12px;
  color:var(--muted);
}
.result{
  background:var(--panel2);
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  box-shadow:var(--shadow);
}
.result-main{
  display:grid;
  grid-template-columns:1.3fr 0.9fr;
  gap:12px;
}
.time-card,
.info-card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
}
.time-card {
  background: var(--panel);
  border: 1px solid var(--accent);
  border-radius: 12px;
  padding: 12px;
  box-shadow: 0 0 0 1px rgba(57,196,141,0.08);
}
.duty-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  margin-bottom:12px;
}
.badges{display:flex; flex-wrap:wrap; gap:6px; margin-top:6px;}
.start-time,
.end-time{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:110px;
  font-family:"JetBrains Mono",monospace;
  font-size:16px;
  font-weight:700;
  color:#c8f5df;
  background:rgba(38,160,111,0.15);
  padding:6px 10px;
  border-radius:8px;
  border:1px solid var(--line);
}
.end-time{margin-left:6px;}
.badge-mid,
.badge-fatigue,
.badge-access,
.badge-ramp{
  font-size:11px;
  color:#fff;
  padding:3px 7px;
  border-radius:999px;
}
.badge-mid { background: var(--warn); }
.badge-fatigue.high { background: var(--danger); }
.badge-fatigue.mid { background: #ca8a04; }
.badge-fatigue.low { background: var(--ok); }
.badge-access { background: #7c3aed; }
.badge-ramp { background: var(--info); }

/* ←ここに追加 */

.badge-mode { background: #0f766e; }
.badge-mission.at { background: #475569; }
.badge-mission.mt { background: #b45309; }
.vehicle-link{
  background:none;
  border:none;
  padding:0;
  margin:0;
  color:var(--accent-strong);
  font:inherit;
  font-weight:700;
  cursor:pointer;
  text-decoration:underline;
}

.vehicle-link:hover{
  opacity:0.85;
}
  
  
.compact-summary {
  margin-top: 6px;
  margin-bottom: 10px;
}


.compact-summary .summary-box {
  min-height: 70px;
}

.badge-rest.long { background: #166534; }
.badge-rest.normal { background: #a16207; }
.badge-rest.tight { background: #b91c1c; }
.badge-mission.at { background: #475569; }
.badge-mission.mt { background: #b45309; }
  
.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.summary-box {
  background: rgba(255,255,255,0.025);
  border: 1px solid var(--line-soft);
  border-radius: 8px;
  padding: 8px 8px;
  min-height: auto;
}
.summary-label {
  font-size: 9px;
  color: var(--muted);
  margin-bottom: 3px;
  letter-spacing: 0.04em;
}

.summary-value {
  font-family: "JetBrains Mono", monospace;
  font-size: 14px;
  font-weight: 700;
}
.item-list{display:grid; gap:8px;}
.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  border:1px solid var(--line-soft);
  border-radius:10px;
  font-size:14px;
  background:rgba(255,255,255,0.02);
}
.item.primary{
  background:linear-gradient(135deg,#1f7a5a,#26a06f);
  color:#fff;
  font-weight:700;
  border-color:transparent;
}
.item.secondary{
  background:rgba(38,160,111,0.15);
  border-left:4px solid #26a06f;
  font-weight:700;
}
.item-label {
  color: #cfe9dd;
  font-weight: 500;
}

.item.primary .item-label,
.item.secondary .item-label{color:#eafff5;}
.item-value {
  font-family: "JetBrains Mono", monospace;
  font-weight: 800;
  font-size: 15px;
}
.info-sections{
  display:grid;
  gap:10px;
}
.info-card-title{
  font-size:11px;
  color:var(--muted);
  margin-bottom:8px;
  letter-spacing:0.08em;
}
.info-card-grid{display:grid; gap:6px;}
.info-row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:6px 0;
  border-bottom:1px solid var(--line-soft);
  font-size:13px;
}
.info-row:last-child{border-bottom:none;}
.info-label{color:var(--muted);}
.info-value{font-weight:700; text-align:right;}
.note-list{
  margin:0;
  padding-left:18px;
  display:grid;
  gap:6px;
}
.note-list li{line-height:1.5;}
.empty{
  color:var(--muted);
  padding:18px;
  text-align:center;
  background:var(--panel2);
  border:1px solid var(--line);
  border-radius:14px;
}

.search-type-toggle{
  display:inline-flex;
  border:1px solid var(--line);
  border-radius:10px;
  overflow:hidden;
  background:rgba(255,255,255,0.02);
  margin-top:16px;
  margin-bottom:10px;
}

.search-type-toggle button{
  padding:10px 16px;
  background:transparent;
  border:none;
  color:var(--muted);
  font-size:14px;
  cursor:pointer;
  font-weight:700;
}

.search-type-toggle button.active{
  background:var(--accent);
  color:#fff;
}  
.footer{
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:10px;
  color:#ffffff;
  margin-top:20px;
  opacity:0.8;
  white-space:nowrap;
  letter-spacing:0.02em;
}
@media(max-width:760px){
  .toolbar{grid-template-columns:1fr;}
  .result-main{grid-template-columns:1fr;}
  .hero-top{flex-direction:column;}
}
@media(max-width:520px){
  .container{padding:14px 12px 28px;}
  .header{font-size:24px;}
  .header .line2{font-size:28px;}
  .duty-head{flex-direction:column;}
  .summary-grid{grid-template-columns:1fr;}
  .start-time,.end-time{min-width:unset; width:auto;}
  .footer{font-size:9px;}
}

.dev-diff-panel{
  margin-top:18px;
  padding:14px;
  border:1px solid var(--line);
  border-radius:14px;
  background:rgba(255,255,255,0.03);
}

.dev-diff-title{
  font-size:13px;
  font-weight:700;
  color:var(--muted);
  margin-bottom:10px;
  letter-spacing:0.04em;
}

.dev-diff-row{
  display:grid;
  grid-template-columns:1fr 1fr 1.2fr;
  gap:8px;
  margin-bottom:10px;
}

.dev-diff-row input,
.dev-diff-row select{
  height:40px;
  padding:0 12px;
  border-radius:10px;
  border:1px solid #d1d5db;
  background:#fff;
  color:#111827;
  font-size:14px;
  font-weight:700;
}

.dev-diff-row button,
.dev-diff-actions button{
  height:40px;
  border:none;
  border-radius:10px;
  background:#334155;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

.dev-diff-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.dev-diff-preview{
  min-height:100px;
  margin:0;
  padding:12px;
  border-radius:10px;
  background:#0b1220;
  color:#cbd5e1;
  border:1px solid #334155;
  overflow:auto;
  font-size:12px;
  line-height:1.5;
}

@media(max-width:760px){
  .dev-diff-row{
    grid-template-columns:1fr;
  }
}



  
</style>
</head>



  
<body>
<div class="container">
  <div class="hero">
    <div class="hero-top">
      <div>
        <div class="header">伊丹市交通局<br><span class="line2">勤番検索ツール ver.3.0</span></div>
        <p class="sub">Duty Search System / Professional Edition</p>
      </div>
      <div class="system-badge">
        <div class="system-badge-title">CURRENT MODE</div>
        <div class="system-badge-value" id="modeLabel">WEEKDAY</div>
      </div>
    </div>
<div class="search-type-toggle">
  <button id="dutySearchBtn" class="active" type="button">勤番検索</button>
  <button id="vehicleSearchBtn" type="button">車両検索</button>
</div>

    <div class="toolbar">
      <div class="mode-toggle">
        <button id="weekdayBtn" class="active" type="button">平日</button>
        <button id="holidayBtn" type="button">休日</button>
      </div>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="例: 39 / 26-2" inputmode="text" autocomplete="off">
        <button id="searchBtn" type="button">検索</button>
      </div>

      <button id="clearBtn" class="action-btn" type="button">クリア</button>
    </div>
  </div>

  <div class="result-headline">
    <div class="result-title">検索結果</div>
    <div class="result-status" id="resultStatus">待機中</div>
  </div>
  <div id="result"></div>
</div>
  
<div class="dev-diff-panel">
  <div class="dev-diff-title">開発者用 差分メモ</div>

  <div class="dev-diff-row">
    <select id="diffDbType">
      <option value="slopeStops">スロープ停留所</option>
      <option value="dutyHardness">しんどさ</option>
      <option value="dutyVehicle">車両割当</option>
      <option value="vehicle">車両情報</option>
    </select>

    <select id="diffMode">
      <option value="weekday">平日</option>
      <option value="holiday">休日</option>
    </select>

    <input type="text" id="diffKeyInput" placeholder="勤番 or 車番 例: 39 / 5394">
  </div>

  <div class="dev-diff-row">
    <input type="text" id="diffFieldInput" placeholder="項目名 例: 停留所 / 疲労度 / 系統 / 前半車番 / 癖">
    <input type="text" id="diffValueInput" placeholder="値 例: スポセン前 / 高 / 22 / 4645 / ブレーキ強め">
    <button id="addDiffBtn" type="button">追加</button>
  </div>

  <div class="dev-diff-actions">
    <button id="showDiffBtn" type="button">差分表示</button>
    <button id="copyDiffBtn" type="button">差分コピー</button>
    <button id="clearDiffBtn" type="button">差分消去</button>
  </div>

  <pre id="diffPreview" class="dev-diff-preview"></pre>
</div>
  
<div class="footer">© 2026 Itami Duty System | Developed by Sanei Co., Ltd.</div>

<script>
let mode = 'weekday';

const weekdayBtn = document.getElementById('weekdayBtn');
const holidayBtn = document.getElementById('holidayBtn');
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const clearBtn = document.getElementById('clearBtn');
const result = document.getElementById('result');
const modeLabel = document.getElementById('modeLabel');
const resultStatus = document.getElementById('resultStatus');
const dutySearchBtn = document.getElementById('dutySearchBtn');
const vehicleSearchBtn = document.getElementById('vehicleSearchBtn');

let searchType = 'duty';
let vehicleDb = {};
let slopeStopsDb = {};
let dutyVehicleDb = { weekday: {}, holiday: {} };
let dutyHardnessDb = { weekday: {}, holiday: {} };
let datasets = { weekday: {}, holiday: {} };

let weekdayLoaded = false;
let vehicleLoaded = false;
let slopeStopsLoaded = false;
let dutyVehicleLoaded = false;
let dutyHardnessLoaded = false;

const DATA_FILES = {
  weekday: './data/weekday.json',
  holiday: './data/holiday.json',
  vehicle: './data/vehicle.json',
  slopeStops: './data/slope_stops.json',
  dutyVehicle: './data/dutyVehicle.json',
  dutyHardness: './data/dutyHardness.json'
};

const FALLBACK_DATA = {
  vehicle: {
    '5394': {
      'ミッション': 'AT',
      '癖': ['素直で運転しやすい', '排気ブレーキ推奨'],
      '注意': [],
      'メモ': 'サンプル'
    }
  },
  slopeStops: {
    '39': ['伊丹中央', '昆陽里'],
    '109': ['阪急伊丹'],
    '227': ['瑞穂小学校前']
  },
  dutyVehicle: {
    weekday: {
      '39': { 前半: [{ 車番: '4645' }], 後半: [{ 車番: '5394' }] },
      '109': { 前半: [{ 車番: '4439' }], 後半: [{ 車番: '5888' }] }
    },
    holiday: {
      '39': { 前半: [{ 車番: '4441' }], 後半: [{ 車番: '5477' }] }
    }
  },
  dutyHardness: {
    weekday: {
      '39': {
        疲労度: '高',
        障害者対応: '多い',
        スロープ対応: 'あり',
        メモ: ['高齢者多い', 'バスマニア対応あり']
      },
      '109': {
        疲労度: '高',
        障害者対応: '少しあり',
        スロープ対応: '多い',
        メモ: ['連続スロープ対応で疲れる']
      }
    },
    holiday: {
      '39': {
        疲労度: '中',
        障害者対応: '少しあり',
        スロープ対応: 'あり',
        メモ: []
      }
    }
  },
  weekday: {
    '39': { 出勤: '7:24', 前半出庫: '7:49', 前半入庫: '11:24', 後半出庫: '13:02', 後半入庫: '15:52', 退勤: '16:02' },
    '109': { 出勤: '12:54', 前半出庫: '13:19', 前半入庫: '16:30', 後半出庫: '17:39', 後半入庫: '21:19', 退勤: '21:29' }
  },
  holiday: {
    '39': { 出勤: '8:45', 前半出庫: '9:10', 前半入庫: '12:26', 後半出庫: '14:13', 後半入庫: '17:13', 退勤: '17:23' }
  }
};
function normalizeDutyData(data) {
  return data && typeof data === 'object' ? data : {};
}

function normalizeVehicleData(data) {
  return data && typeof data === 'object' ? data : {};
}

function normalizeModeMapData(data) {
  if (!data || typeof data !== 'object') {
    return { weekday: {}, holiday: {} };
  }
  return {
    weekday: data.weekday && typeof data.weekday === 'object' ? data.weekday : {},
    holiday: data.holiday && typeof data.holiday === 'object' ? data.holiday : {}
  };
}

function normalizeVehicleAssignment(entry) {
  if (!entry || typeof entry !== 'object') return { 前半: [], 後半: [] };
  return {
    前半: Array.isArray(entry.前半) ? entry.前半 : [],
    後半: Array.isArray(entry.後半) ? entry.後半 : []
  };
}

function normalizeHardnessEntry(entry) {
  if (!entry || typeof entry !== 'object') {
    return {
      疲労度: '―',
      障害者対応: '―',
      スロープ対応: '―',
      系統: [],
      乗車バス停: [],
      乗客特長: [],
      メモ: []
    };
  }
  return {
    疲労度: entry.疲労度 || '―',
    障害者対応: entry.障害者対応 || '―',
    スロープ対応: entry.スロープ対応 || '―',
    系統: Array.isArray(entry.系統) ? entry.系統 : [],
    乗車バス停: Array.isArray(entry.乗車バス停) ? entry.乗車バス停 : [],
    乗客特長: Array.isArray(entry.乗客特長) ? entry.乗客特長 : [],
    メモ: Array.isArray(entry.メモ) ? entry.メモ : []
  };
}

async function fetchJson(path) {
  const response = await fetch(path, { cache: 'no-store' });
  if (!response.ok) {
    throw new Error(`${path} の読込に失敗 (${response.status})`);
  }
  return response.json();
}

async function loadExternalData() {
  resultStatus.textContent = 'DB読込中';

  // 初期化
  weekdayLoaded = false;
  vehicleLoaded = false;
  dutyVehicleLoaded = false;
  dutyHardnessLoaded = false;

  // 勤務DB
  try {
    const weekdayJson = await fetchJson(DATA_FILES.weekday);
    const holidayJson = await fetchJson(DATA_FILES.holiday);

    datasets = {
      weekday: normalizeDutyData(weekdayJson),
      holiday: normalizeDutyData(holidayJson)
    };

    weekdayLoaded = true;
  } catch (e) {
    console.error('勤務DB読込失敗', e);
    datasets = {
      weekday: {},
      holiday: {}
    };
  }

  // 車両DB
  try {
    const vehicleJson = await fetchJson(DATA_FILES.vehicle);
    vehicleDb = normalizeVehicleData(vehicleJson);
    vehicleLoaded = true;
  } catch (e) {
    console.error('車両DB読込失敗', e);
    vehicleDb = {};
  }
  // スロープ停留所DB
try {
  const res = await fetch(DATA_FILES.slopeStops);
  if (!res.ok) throw new Error('slope_stops.json 読込失敗');
  slopeStopsDb = await res.json();
  slopeStopsLoaded = true;
} catch (err) {
  console.error('slopeStops DB load error:', err);
  slopeStopsDb = FALLBACK_DATA.slopeStops || {};
  slopeStopsLoaded = false;
}


  
  // 割付DB
  try {
    const dutyVehicleJson = await fetchJson(DATA_FILES.dutyVehicle);
    dutyVehicleDb = normalizeModeMapData(dutyVehicleJson);

function getFatigueClass(level) {
  if (level === '高') return 'high';
  if (level === '中') return 'mid';
  return 'low';
}

function timeToMinutes(t) {
  if (!t || typeof t !== 'string' || !t.includes(':')) return 0;
  const [h, m] = t.split(':').map(Number);
  if (Number.isNaN(h) || Number.isNaN(m)) return 0;
  return h * 60 + m;
}

function minutesToTime(min) {
  if (!Number.isFinite(min) || min < 0) return '―';
  const h = Math.floor(min / 60);
  const m = min % 60;
  return `${h}時間${m}分`;
}

function calcSummary(duty) {
  const start = timeToMinutes(duty['出勤']);
  const end = timeToMinutes(duty['退勤']);

  const frontStart = timeToMinutes(duty['前半出庫']);
  const frontEnd = timeToMinutes(duty['前半入庫']);

  const backStart = timeToMinutes(duty['後半出庫']);
  const backEnd = timeToMinutes(duty['後半入庫']);

  const frontWork = Math.max(0, frontEnd - frontStart);
  const backWork = Math.max(0, backEnd - backStart);

  const total拘束 = Math.max(0, end - start);
  const total実働 = frontWork + backWork;
  const 休憩 = Math.max(0, total拘束 - total実働);

  let restQuality = '標準';
  if (休憩 >= 120) restQuality = '余裕あり';
  else if (休憩 < 60) restQuality = 'タイト';

  return {
    front: minutesToTime(frontWork),
    back: minutesToTime(backWork),
    rest: minutesToTime(休憩),
    restQuality
  };
}

function findDutiesByVehicle(carNo) {
  const results = [];

  ['weekday', 'holiday'].forEach(modeKey => {
    const modeLabel = modeKey === 'weekday' ? '平日' : '休日';
    const modeData = dutyVehicleDb[modeKey] || {};

    Object.entries(modeData).forEach(([dutyNo, assignment]) => {
      const normalized = normalizeVehicleAssignment(assignment);

      const frontHit = normalized.前半.some(item => String(item.車番 || '') === String(carNo));
      const backHit = normalized.後半.some(item => String(item.車番 || '') === String(carNo));

      if (frontHit) {
        results.push({
          mode: modeKey,
          modeLabel,
          dutyNo,
          part: '前半'
        });
      }

      if (backHit) {
        results.push({
          mode: modeKey,
          modeLabel,
          dutyNo,
          part: '後半'
        });
      }
    });
  });

  return results;
}

function searchDuty() {
  let input = searchInput.value.trim();
  if (!input) {
    result.innerHTML = '';
    resultStatus.textContent = '待機中';
    return;
  }

  input = input.replace(/[０-９]/g, s =>
    String.fromCharCode(s.charCodeAt(0) - 0xFEE0)
  );

  input = input.replace(/[ー－―]/g, '-');

  const normalizedInput = input.replace(/勤$/i, '');
  const data = datasets[mode] || {};

  let duty = data[normalizedInput];
  let dutyKey = normalizedInput;

  const baseInput = normalizedInput.split('-')[0];

  if (!duty) {
    if (data[baseInput]) {
      duty = data[baseInput];
      dutyKey = baseInput;
    } else if (data[`${baseInput}-1`]) {
      duty = data[`${baseInput}-1`];
      dutyKey = `${baseInput}-1`;
    } else if (data[`${baseInput}-2`]) {
      duty = data[`${baseInput}-2`];
      dutyKey = `${baseInput}-2`;
    }
  }

  if (!duty) {
    result.innerHTML = '<div class="empty">未登録の勤番です（DB未入力または誤入力）</div>';
    resultStatus.textContent = '未登録';
    return;
  }

  const baseDutyNo = dutyKey.split('-')[0];
  const slopeStops = slopeStopsDb[mode]?.[dutyKey] 
    || slopeStopsDb[mode]?.[baseDutyNo] 
    || [];
  const hardness = dutyHardnessDb[mode]?.[dutyKey] || dutyHardnessDb[mode]?.[baseDutyNo];
  const vehicle = dutyVehicleDb[mode]?.[dutyKey] || dutyVehicleDb[mode]?.[baseDutyNo];

  result.innerHTML = renderDutyHtml(dutyKey, duty, hardness, vehicle, slopeStops);
  resultStatus.textContent = `${mode === 'weekday' ? '平日' : '休日'} ${dutyKey.includes('-') ? dutyKey : dutyKey + '勤'} を表示中`;
}

      vehicle: {}
    }));
  } catch (e) {
    console.error('差分メモ読込失敗', e);
    return {
      slopeStops: { weekday: {}, holiday: {} },
      dutyHardness: { weekday: {}, holiday: {} },
      dutyVehicle: { weekday: {}, holiday: {} },
      vehicle: {}
    };
  }
}

function saveDevDiff(data) {
  localStorage.setItem(DEV_DIFF_KEY, JSON.stringify(data));
}

function renderDevDiffPreview() {
  const diff = getDevDiff();
  diffPreview.textContent = JSON.stringify(diff, null, 2);
}

function normalizeKey(value) {
  return value
    .trim()
    .replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
    .replace(/[ー－―]/g, '-')
    .replace(/勤$/i, '');
}

function pushUnique(arr, value) {
  if (!Array.isArray(arr)) arr = [];
  if (!arr.includes(value)) arr.push(value);
  return arr;
}

function addSlopeDiff(diff, modeKey, key, field, value) {
  if (field !== '停留所') {
    alert('スロープ停留所は項目名に「停留所」と入力してください');
    return;
  }
  const current = Array.isArray(diff.slopeStops[modeKey][key]) ? diff.slopeStops[modeKey][key] : [];
  diff.slopeStops[modeKey][key] = pushUnique(current, value);
}

function addHardnessDiff(diff, modeKey, key, field, value) {
  if (!diff.dutyHardness[modeKey][key]) {
    diff.dutyHardness[modeKey][key] = {
      疲労度: '',
      障害者対応: '',
      スロープ対応: '',
      系統: [],
      乗車バス停: [],
      乗客特長: [],
      メモ: []
    };
  }

  const target = diff.dutyHardness[modeKey][key];

  if (field === '疲労度' || field === '障害者対応' || field === 'スロープ対応') {
    if (!target[field]) target[field] = value;
    return;
  }

  if (field === '系統' || field === '乗車バス停' || field === '乗客特長' || field === 'メモ') {
    target[field] = pushUnique(target[field], value);
    return;
  }

  alert('しんどさDBの項目名が不正です');
}

function addDutyVehicleDiff(diff, modeKey, key, field, value) {
  if (!diff.dutyVehicle[modeKey][key]) {
    diff.dutyVehicle[modeKey][key] = { 前半: [], 後半: [] };
  }

  const target = diff.dutyVehicle[modeKey][key];

  if (field === '前半車番') {
    target.前半.push({ 車番: value });
    return;
  }

  if (field === '後半車番') {
    target.後半.push({ 車番: value });
    return;
  }

  alert('車両割当の項目名は「前半車番」または「後半車番」にしてください');
}

function addVehicleDiff(diff, key, field, value) {
  if (!diff.vehicle[key]) {
    diff.vehicle[key] = {
      ミッション: '',
      癖: [],
      注意: [],
      メモ: ''
    };
  }

  const target = diff.vehicle[key];

  if (field === 'ミッション') {
    if (!target.ミッション) target.ミッション = value;
    return;
  }

  if (field === '癖' || field === '注意') {
    target[field] = pushUnique(target[field], value);
    return;
  }

  if (field === 'メモ') {
    if (!target.メモ) target.メモ = value;
    return;
  }

  alert('車両DBの項目名が不正です');
}

addDiffBtn.onclick = () => {
  const dbType = diffDbType.value;
  const modeKey = diffMode.value;
  const key = normalizeKey(diffKeyInput.value);
  const field = diffFieldInput.value.trim();
  const value = diffValueInput.value.trim();

  if (!dbType || !key || !field || !value) {
    alert('DB種別・キー・項目名・値を入力してください');
    return;
  }

  const diff = getDevDiff();

  if (dbType === 'slopeStops') {
    addSlopeDiff(diff, modeKey, key, field, value);
  } else if (dbType === 'dutyHardness') {
    addHardnessDiff(diff, modeKey, key, field, value);
  } else if (dbType === 'dutyVehicle') {
    addDutyVehicleDiff(diff, modeKey, key, field, value);
  } else if (dbType === 'vehicle') {
    addVehicleDiff(diff, key, field, value);
  }

  saveDevDiff(diff);
  renderDevDiffPreview();

  diffFieldInput.value = '';
  diffValueInput.value = '';
  diffValueInput.focus();
};

showDiffBtn.onclick = () => {
  renderDevDiffPreview();
};

copyDiffBtn.onclick = async () => {
  try {
    await navigator.clipboard.writeText(JSON.stringify(getDevDiff(), null, 2));
    alert('差分メモをコピーしました');
  } catch (e) {
    alert('コピーに失敗しました');
  }
};

clearDiffBtn.onclick = () => {
  if (!confirm('差分メモを全消去しますか？')) return;
  localStorage.removeItem(DEV_DIFF_KEY);
  renderDevDiffPreview();
};

renderDevDiffPreview();
  
async function initializeApp() {
  await loadExternalData();

  // ↓ここに追加（この位置）
  console.log('weekday keys =', Object.keys(datasets.weekday));
  console.log('weekday 26 =', datasets.weekday['26']);

  runSelfTests();
}

initializeApp();
</script>
