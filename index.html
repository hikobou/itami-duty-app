<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>伊丹市交通局 勤番検索</title>
<style>
:root{
  --bg:#052e2b;
  --panel:rgba(255,255,255,.08);
  --card:#f8fafc;
  --line:#dbe4f0;
  --text:#0f172a;
  --muted:#64748b;
  --blue:#2563eb;
  --cyan:#06b6d4;
  --green:#10b981;
  --red:#ef4444;
  --amber:#f59e0b;
  --shadow:0 28px 70px rgba(0,0,0,.38);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:#fff;
  background:
    radial-gradient(circle at top right, rgba(6,95,70,.32), transparent 28%),
    radial-gradient(circle at bottom left, rgba(4,78,59,.24), transparent 26%),
    linear-gradient(135deg,#032f2b 0%,#064e3b 52%,#022c22 100%);
  background-attachment:fixed;
}
html{min-height:100%}
.shell{max-width:1100px;margin:auto;padding:18px 18px 28px;min-height:100vh}
.hero{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:16px}
.glass{
  background:var(--panel);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:28px;
  box-shadow:var(--shadow);
}
.hero-main{padding:26px;position:relative;overflow:hidden}
.hero-main::after{
  content:"";
  position:absolute;
  right:-70px;
  bottom:-70px;
  width:220px;
  height:220px;
  background:radial-gradient(circle, rgba(255,255,255,.22), transparent 65%);
}
.badge{
  display:inline-flex;
  padding:8px 12px;
  border-radius:999px;
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
}
h1{margin:18px 0 10px;font-size:clamp(30px,4vw,46px);line-height:1.04;letter-spacing:-.04em;text-shadow:0 0 18px rgba(255,255,255,.16),0 2px 10px rgba(0,0,0,.18)}
.hero p{margin:0;color:rgba(255,255,255,.78);line-height:1.8}
.hero-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.hero-chip{padding:10px 12px;border-radius:14px;background:rgba(255,255,255,.08);font-size:13px}
.side{padding:18px;display:grid;gap:12px}
.sidebox{padding:16px;border-radius:20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08)}
.sidebox .k{font-size:12px;color:rgba(255,255,255,.62);margin-bottom:8px}
.sidebox .v{font-size:26px;font-weight:800;letter-spacing:-.04em}
.layout{display:grid;grid-template-columns:1fr;gap:16px}
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.left,.right{display:grid;gap:16px;align-content:start}
.search-card{padding:20px;box-shadow:0 30px 80px rgba(0,0,0,.42)}
.section-top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
.section-top h3{margin:0;font-size:18px;letter-spacing:-.03em}
.section-top .sub{font-size:12px;color:rgba(255,255,255,.62)}
.mode-switch{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mode-btn{border:none;border-radius:18px;padding:14px 16px;font-weight:800;cursor:pointer;transition:.2s}
.mode-btn.active{background:linear-gradient(135deg,#172554 0%,#1e3a8a 100%);color:#ffffff;box-shadow:0 10px 24px rgba(15,23,42,.28)}
.mode-btn.idle{background:linear-gradient(135deg,#fdf2f8 0%,#fbcfe8 100%);color:#831843;border:1px solid rgba(244,114,182,.28);box-shadow:0 10px 24px rgba(244,114,182,.16)}
.search-row{display:grid;grid-template-columns:1fr auto;gap:10px}
.search-input{
  width:100%;
  border:1px solid #cbd5e1;
  background:#ffffff;
  color:#0f172a;
  border-radius:18px;
  padding:16px 18px;
  font-size:18px;
  outline:none;
}
.search-input::placeholder{color:#94a3b8}
.search-btn{
  border:none;
  border-radius:18px;
  padding:0 22px;
  min-width:132px;
  font-weight:800;
  color:white;
  background:linear-gradient(135deg,#0f766e 0%,#065f46 100%);
  box-shadow:0 14px 30px rgba(37,99,235,.28);
  cursor:pointer;
}
.notice{display:none;margin-top:10px;padding:10px 12px;border-radius:14px;background:#450a0a;color:#fecaca;border:1px solid #7f1d1d;font-size:14px}
.card{
  background:rgba(248,250,252,.98);
  color:var(--text);
  border-radius:28px;
  padding:18px;
  box-shadow:var(--shadow);
}
.result-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
.result-head h3{margin:0;font-size:22px;letter-spacing:-.03em}
.result-id{font-size:13px;font-weight:700;color:#334155;background:#eff6ff;border:1px solid #dbeafe;padding:8px 12px;border-radius:999px}
.meta-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:14px}
.meta-item{padding:14px;border-radius:18px;background:#fff;border:1px solid var(--line)}
.meta-item .k{font-size:12px;color:var(--muted);margin-bottom:6px}
.meta-item .v{font-size:18px;font-weight:800;letter-spacing:-.03em}
.result-list{margin-top:14px;border-radius:22px;overflow:hidden;border:1px solid var(--line);background:white}
.result-row{display:grid;grid-template-columns:120px 1fr;gap:12px;padding:14px 16px;border-top:1px solid #eef2f7}
.result-row:first-child{border-top:none}
.result-row:nth-child(even){background:#fafcff}
.result-row .k{color:var(--muted);font-size:13px;font-weight:700}
.result-row .v{font-weight:800;letter-spacing:-.02em;word-break:break-all}
.toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
.mini-btn{border:none;border-radius:14px;padding:10px 12px;font-size:12px;font-weight:800;background:#0f172a;color:#fff;cursor:pointer}
.rank-list{display:grid;gap:10px}
.rank-btn{display:flex;justify-content:space-between;align-items:center;gap:12px;border:1px solid var(--line);background:linear-gradient(180deg,#fff 0%,#f8fafc 100%);border-radius:18px;padding:14px 16px;cursor:pointer}
.rank-left{display:flex;align-items:center;gap:12px}
.rank-no{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:13px;font-weight:800;background:#dbeafe;color:#1d4ed8}
.rank-duty{font-weight:800;letter-spacing:-.02em}
.rank-note{font-size:12px;color:var(--muted)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.pill{display:inline-flex;align-items:center;justify-content:center;min-width:84px;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:800;border:1px solid transparent}
.red{background:#fee2e2;color:#b91c1c;border-color:#fecaca}
.orange{background:#ffedd5;color:#c2410c;border-color:#fdba74}
.yellow{background:#fef3c7;color:#a16207;border-color:#fde68a}
.blue{background:#e0f2fe;color:#0c4a6e;border-color:#bae6fd}
.gray{background:#f8fafc;color:#64748b;border-color:#e2e8f0}
.memo-box,.vehicle-box{margin-top:14px;border-radius:20px;padding:16px;border:1px solid var(--line);background:linear-gradient(180deg,#fff 0%,#f8fafc 100%)}
.memo-box p,.vehicle-box p{margin:0;color:var(--muted);line-height:1.8;white-space:pre-wrap}
.editor{display:none;margin-top:14px}
.editor.show{display:block}
.editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.input,.ta{width:100%;border:1px solid #cbd5e1;border-radius:16px;padding:12px 14px;font:inherit;background:white}
.ta{min-height:96px;resize:vertical}
.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.copy{text-align:center;color:rgba(255,255,255,.5);font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-top:14px}
@media (max-width:900px){.hero,.layout,.bottom-grid{grid-template-columns:1fr}}
@media (max-width:640px){.shell{padding:14px 12px 40px}.hero-main,.side,.search-card,.card{border-radius:24px}.search-row{grid-template-columns:1fr}.search-btn{min-height:54px}.meta-grid,.editor-grid{grid-template-columns:1fr}.result-row{grid-template-columns:1fr;gap:4px}}
</style>
</head>
<body>
<div class="shell">
  <section class="hero">
    <div class="glass hero-main">
      
      <div class="badge">Itami Duty Search System</div>
      <h1>伊丹市交通局<br>勤務検索システム</h1>
      <p>勤務時間、関連車両、しんどさメモを一つの画面で高速に確認するツール</p>
      <div class="hero-meta"><div class="hero-chip">平日 / 休日 切替</div><div class="hero-chip">車両DB連動</div><div class="hero-chip">しんどさ編集対応</div></div>
    </div>
      </section>

  <section class="layout">
    <div class="card search-card">
        <div class="section-top"><div><h3>勤務検索</h3><div class="sub">番号入力だけで一発表示</div></div></div>
        <div class="mode-switch"><button id="weekdayBtn" class="mode-btn active">平日モード</button><button id="holidayBtn" class="mode-btn idle">休日モード</button></div>
        <div class="search-row"><input id="dutyInput" class="search-input" placeholder="勤番（例: 222 / 201 / AF1 / PF2）"><button id="searchBtn" class="search-btn">検索</button></div>
        <div id="notice" class="notice">該当する勤番は未登録です。</div>
    </div>

    <div id="resultCard" class="card" style="display:none">
        <div id="resultRankRow" class="chips" style="margin-bottom:10px"></div>
        <div class="result-head"><h3>検索結果</h3><div id="resultBadge" class="result-id">--</div></div>
        <div class="meta-grid"><div class="meta-item"><div class="k">出勤</div><div id="metaStart" class="v">--</div></div><div class="meta-item"><div class="k">退勤</div><div id="metaEnd" class="v">--</div></div></div>
        <div id="resultList" class="result-list"></div>
      </div>

      <div class="bottom-grid">
      <div id="vehicleCard" class="card" style="display:none">
        <div class="toolbar"><strong>関連車両</strong><button id="editVehicleBtn" class="mini-btn">車両編集</button></div>
        <div id="vehicleChips" class="chips"></div>
        <div id="vehicleBox" class="vehicle-box"><p>該当車両なし</p></div>
        <div id="vehicleEditor" class="editor">
          <div class="editor-grid"><input id="vehicleNoInput" class="input" placeholder="車番"><input id="vehicleFirstInput" class="input" placeholder="前半"></div>
          <div style="margin-top:10px"><input id="vehicleSecondInput" class="input" placeholder="後半"></div>
          <div style="margin-top:10px"><textarea id="vehicleNoteInput" class="ta" placeholder="癖メモ"></textarea></div>
          <div class="btn-row"><button id="saveVehicleBtn" class="mini-btn">保存</button><button id="cancelVehicleBtn" class="mini-btn" style="background:#64748b">キャンセル</button></div>
        </div>
      </div>

      <div id="memoCard" class="card" style="display:none">
        <div class="toolbar"><strong>しんどさDB</strong><button id="editMemoBtn" class="mini-btn">編集</button></div>
        <div id="severityRow" class="chips"></div>
        <div class="memo-box"><p id="memoText">未登録</p></div>
        <div id="memoEditor" class="editor">
          <div class="editor-grid"><input id="shindoInput" class="input" placeholder="しんどさ"><input id="ahoInput" class="input" placeholder="アホアホ"></div>
          <div style="margin-top:10px"><textarea id="memoInput" class="ta" placeholder="メモ"></textarea></div>
          <div class="btn-row"><button id="saveMemoBtn" class="mini-btn">保存</button><button id="cancelMemoBtn" class="mini-btn" style="background:#64748b">キャンセル</button></div>
        </div>
      </div>
    </div>
      </div>
  </section>

  <div class="copy">Produced by San-Ei Co., Ltd.</div>
</div>

const defaultShindosa={weekday:{"39":{しんどさ:"1位",アホアホ:"1位",メモ:"バスマニア・アホアホ・年寄り・車椅子連発。休憩1:30あるが総合的に最重要注意。"},"109":{しんどさ:"2位",アホアホ:"―",メモ:"車椅子連発・返金対応あり。結構しんどい。"},"222":{しんどさ:"注意",アホアホ:"注意",メモ:"7系統2本目でベレー帽のアホアホ女。"},"227":{しんどさ:"3位",アホアホ:"2位",メモ:"23にアホアホマン。後半40を8本の修行で余裕全く無し。トイレ行けない。"}},holiday:{"121":{しんどさ:"注意",アホアホ:"注意",メモ:"鴻池東から7を4本、3本目でアホアホマン多数。後半はJRから18を5本。"},"125":{しんどさ:"注意",アホアホ:"―",メモ:"前半がかなりしんどい。終わりが22時半回る。"},"134":{しんどさ:"注意",アホアホ:"―",メモ:"36で言葉話せないBBA車椅子。前半全て遅れ運行でトイレ行けない。後半は余裕あり。"},"206":{しんどさ:"注意",アホアホ:"―",メモ:"武庫川センターから18ひとつ、5を3本。中山寺は時間余裕なし。"}}};
const defaultVehicle={assignments:{"2480":{車番:"2480",平日前半:"21",平日後半:"211後",土休前半:"25",土休後半:"212後"},"3445":{車番:"3445",平日前半:"216前",平日後半:"101",土休前半:"210前",土休後半:"115"},"4443":{車番:"4443",平日前半:"35",平日後半:"219後",土休前半:"27",土休後半:"210後"}},notes:{"2480":"ブレーキ強い\nジャジャ馬\n暖房良い","3445":"直進不安定\n尻痛い\n排気ブレーキショック","4443":"乗りやすい\n暖房よく効く\n排気ブレーキ不要"}};
function clone(v){return JSON.parse(JSON.stringify(v))}
function loadLS(key,fallback){try{const raw=localStorage.getItem(key);if(!raw)return clone(fallback);const parsed=JSON.parse(raw);if(key==='itami-sh')return{weekday:{...fallback.weekday,...(parsed.weekday||{})},holiday:{...fallback.holiday,...(parsed.holiday||{})}};if(key==='itami-v')return{assignments:{...fallback.assignments,...(parsed.assignments||{})},notes:{...fallback.notes,...(parsed.notes||{})}};return parsed}catch(e){return clone(fallback)}}
function saveLS(key,value){localStorage.setItem(key,JSON.stringify(value))}
function norm(v){return String(v||'').trim().toUpperCase().replace(/\s+/g,'')}
function pick(v){const m=String(v||'').match(/\d+/);return m?m[0]:''}
function isWaiting(k){return /^(AF|PF)/.test(String(k))}
function sevClass(v){if(v==='1位')return 'pill red';if(v==='2位')return 'pill orange';if(v==='3位')return 'pill yellow';if(v==='注意')return 'pill blue';return 'pill gray'}
let mode='weekday',current=null,shdb=loadLS('itami-sh',defaultShindosa),vdb=loadLS('itami-v',defaultVehicle);
const $=id=>document.getElementById(id)
function activeBase(){return mode==='weekday'?weekdayBase:holidayBase}
function currentShindosa(){return current?((shdb[mode]||{})[String(current.勤番)]||null):null}
function linkedVehicles(){if(!current)return[];return Object.values(vdb.assignments).filter(v=>{const a=mode==='weekday'?v.平日前半:v.土休前半;const b=mode==='weekday'?v.平日後半:v.土休後半;return pick(a)===current.勤番||pick(b)===current.勤番})}
function renderMode(){$('weekdayBtn').className='mode-btn '+(mode==='weekday'?'active':'idle');$('holidayBtn').className='mode-btn '+(mode==='holiday'?'active':'idle')}
function render(){
  // ランキング（検索結果にのみ表示）
  if(current){
    const rS = rankingData.shindosa.indexOf(String(current.勤番));
    const rA = rankingData.aho.indexOf(String(current.勤番));
    const s = currentShindosa();
    const chips = [];
    if(rS>=0) chips.push(`<span class="${sevClass(s?.しんどさ)}">しんどさ: ${rS+1}位</span>`);
    if(rA>=0) chips.push(`<span class="${sevClass(s?.アホアホ)}">アホアホ: ${rA+1}位</span>`);
    if(rS<0 && rA<0) chips.push(`<span class="pill gray">ランキング外</span>`);
    const el = document.getElementById('resultRankRow');
    if(el) el.innerHTML = chips.join('');
  }const has=!!current;$('resultCard').style.display=has?'block':'none';$('vehicleCard').style.display=has?'block':'none';$('memoCard').style.display=has?'block':'none';if(!has)return;$('resultBadge').textContent=`${current.勤番}勤 / ${mode==='weekday'?'平日':'休日'}`;$('metaStart').textContent=current.出勤||'--';$('metaEnd').textContent=current.退勤||'--';const fields=isWaiting(current.勤番)?WAIT_FIELDS:FIELDS;$('resultList').innerHTML=fields.map(f=>`<div class="result-row"><div class="k">${f}</div><div class="v">${current[f]||'未登録'}</div></div>`).join('');const s=currentShindosa();$('severityRow').innerHTML=`<span class="${sevClass(s?.しんどさ)}">しんどさ: ${s?.しんどさ||'―'}</span><span class="${sevClass(s?.アホアホ)}">アホアホ: ${s?.アホアホ||'―'}</span>`;$('memoText').textContent=s?.メモ||'未登録';const lv=linkedVehicles();$('vehicleChips').innerHTML=lv.length?lv.map(v=>`<span class="pill blue">${v.車番}</span>`).join(''):`<span class="pill gray">該当車両なし</span>`;$('vehicleBox').innerHTML=lv.length?lv.map(v=>`<p><strong>車番 ${v.車番}</strong>\n${mode==='weekday'?v.平日前半:v.土休前半} / ${mode==='weekday'?v.平日後半:v.土休後半}\n\n${vdb.notes[v.車番]||'癖メモ未登録'}</p>`).join(''):'<p>該当車両なし</p>';$('editVehicleBtn').style.display=isWaiting(current.勤番)?'none':'inline-block'}
function search(){current=activeBase()[norm($('dutyInput').value)]||null;$('notice').style.display=current?'none':'block';$('memoEditor').classList.remove('show');$('vehicleEditor').classList.remove('show');render()}
window.openDuty=function(d){$('dutyInput').value=d;search()}
$('weekdayBtn').onclick=()=>{mode='weekday';current=null;$('notice').style.display='none';renderMode();render()}

$('searchBtn').onclick=search;$('dutyInput').addEventListener('keydown',e=>{if(e.key==='Enter')search()})
$('editMemoBtn').onclick=()=>{if(!current)return;const s=currentShindosa()||{しんどさ:'―',アホアホ:'―',メモ:''};$('shindoInput').value=s.しんどさ||'―';$('ahoInput').value=s.アホアホ||'―';$('memoInput').value=s.メモ||'';$('memoEditor').classList.add('show')}
$('saveMemoBtn').onclick=()=>{if(!current)return;const k=String(current.勤番);shdb[mode]=shdb[mode]||{};shdb[mode][k]={しんどさ:$('shindoInput').value||'―',アホアホ:$('ahoInput').value||'―',メモ:$('memoInput').value||''};saveLS('itami-sh',shdb);$('memoEditor').classList.remove('show');render()}
$('cancelMemoBtn').onclick=()=>$('memoEditor').classList.remove('show')
$('editVehicleBtn').onclick=()=>{if(!current)return;const lv=linkedVehicles(),ex=lv[0],no=ex?.車番||'',as=no?vdb.assignments[no]:null;$('vehicleNoInput').value=no;$('vehicleFirstInput').value=as?(mode==='weekday'?as.平日前半:as.土休前半):String(current.勤番);$('vehicleSecondInput').value=as?(mode==='weekday'?as.平日後半:as.土休後半):'予';$('vehicleNoteInput').value=no?(vdb.notes[no]||''):'';$('vehicleEditor').classList.add('show')}
