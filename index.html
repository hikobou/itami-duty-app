<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>伊丹市交通局 勤番検索</title>
<style>
:root{
  --bg:#f1f5f9; --card:#ffffff; --line:#e2e8f0; --text:#0f172a; --sub:#64748b;
  --dark:#0f172a; --soft:#f8fafc; --sky:#e0f2fe; --green:#ecfdf5; --rose:#fff1f2;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:820px;margin:0 auto;padding:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:14px;margin-bottom:12px}
h1{margin:0 0 4px;font-size:22px}
.sub{font-size:12px;color:var(--sub)}
.row{display:flex;gap:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
button,input,textarea{font:inherit}
.btn{border:none;border-radius:14px;padding:12px 14px;font-weight:700;cursor:pointer}
.dark{background:var(--dark);color:#fff}
.soft{background:var(--soft);border:1px solid var(--line);color:var(--text)}
.input,.ta{width:100%;border:1px solid #cbd5e1;border-radius:14px;padding:12px 14px;background:#fff}
.ta{min-height:96px;resize:vertical}
.field{display:grid;grid-template-columns:92px 1fr;gap:10px;padding:10px 12px;border-top:1px solid var(--line);font-size:14px}
.field:first-child{border-top:none}
.label{color:var(--sub);font-weight:600}
.value{font-weight:700;word-break:break-all}
.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:700;background:var(--soft);margin:2px 6px 2px 0}
.red{background:#ffe4e6;border-color:#fecdd3;color:#be123c}
.orange{background:#ffedd5;border-color:#fdba74;color:#c2410c}
.yellow{background:#fef9c3;border-color:#fde68a;color:#a16207}
.sky{background:var(--sky);border-color:#bae6fd}
.green{background:var(--green);border-color:#a7f3d0}
.rose{background:var(--rose);border-color:#fecdd3;color:#be123c}
.box{background:#fff;border:1px solid #d1fae5;border-radius:14px;padding:10px;margin-top:8px}
.copy{text-align:center;color:#64748b;font-size:11px;padding:6px 0 18px}
.small{font-size:12px;color:var(--sub)}
@media (max-width:640px){
  .wrap{padding:10px}
  .field{grid-template-columns:84px 1fr;font-size:13px}
  .row{flex-wrap:wrap}
  .row .btn{width:100%}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>伊丹市交通局 勤番検索</h1>
    <div class="sub">完成版 / 平日・休日切替 / 勤番検索 / しんどさDB編集 / 車両DB編集 / ランキング</div>
    <div class="grid2" style="margin-top:10px">
      <button id="w" class="btn dark">平日モード</button>
      <button id="h" class="btn soft">休日モード</button>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <input id="q" class="input" placeholder="勤番（例: 222 / 201 / AF1 / PF2）">
      <button id="go" class="btn dark">勤番検索</button>
    </div>
    <div id="err" class="card rose" style="display:none;margin-top:10px;padding:10px 12px">該当する勤番は未登録です。</div>

    <div id="res" style="display:none;margin-top:12px">
      <div id="fields" class="card" style="padding:0;overflow:hidden"></div>

      <div class="card green">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px">
          <strong>関連車両</strong>
          <button id="editV" class="btn soft" style="padding:8px 10px;font-size:12px">車両編集</button>
        </div>
        <div id="vs" style="font-size:14px">該当車両なし</div>
        <div id="vl"></div>

        <div id="ve" style="display:none;margin-top:10px">
          <input id="vn" class="input" placeholder="車番">
          <div class="grid2" style="margin-top:8px">
            <input id="vf" class="input" placeholder="前半">
            <input id="vb" class="input" placeholder="後半">
          </div>
          <textarea id="vnote" class="ta" placeholder="癖メモ" style="margin-top:8px"></textarea>
          <div class="row" style="margin-top:8px">
            <button id="sv" class="btn dark">保存</button>
            <button id="cv" class="btn soft">キャンセル</button>
          </div>
        </div>
      </div>

      <div class="card sky">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px">
          <strong>しんどさDB</strong>
          <button id="editS" class="btn soft" style="padding:8px 10px;font-size:12px">編集</button>
        </div>
        <div>
          <span id="s1" class="pill">しんどさ: ―</span>
          <span id="s2" class="pill">アホアホ: ―</span>
        </div>
        <div id="memo" style="margin-top:10px;white-space:pre-wrap;font-size:14px">未登録</div>

        <div id="se" style="display:none;margin-top:10px">
          <div class="grid2">
            <input id="es" class="input" placeholder="しんどさ">
            <input id="ea" class="input" placeholder="アホアホ">
          </div>
          <textarea id="em" class="ta" placeholder="メモ" style="margin-top:8px"></textarea>
          <div class="row" style="margin-top:8px">
            <button id="ss" class="btn dark">保存</button>
            <button id="cs" class="btn soft">キャンセル</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="grid2">
      <div>
        <strong>しんどさランキング</strong>
        <div id="r1" style="margin-top:8px"></div>
      </div>
      <div>
        <strong>アホアホランキング</strong>
        <div id="r2" style="margin-top:8px"></div>
      </div>
    </div>
  </div>

  <div class="copy">Produced by San-Ei Co., Ltd.</div>
</div>

const ds={weekday:{
"39":{しんどさ:"1位",アホアホ:"1位",メモ:"バスマニア・アホアホ・年寄り・車椅子連発。休憩1:30あるが総合的に最重要注意。"},
"109":{しんどさ:"2位",アホアホ:"―",メモ:"車椅子連発・返金対応あり。結構しんどい。"},
"222":{しんどさ:"―",アホアホ:"注意",メモ:"7系統2本目でベレー帽のアホアホ女。"},
"227":{しんどさ:"3位",アホアホ:"2位",メモ:"23にアホアホマン。後半40を8本の修行で余裕全く無し。トイレ行けない。"}
},holiday:{
"121":{しんどさ:"注意",アホアホ:"注意",メモ:"鴻池東から7を4本、3本目でアホアホマン多数。後半はJRから18を5本。"},

"134":{しんどさ:"注意",アホアホ:"―",メモ:"36で言葉話せないBBA車椅子。前半全て遅れ運行でトイレ行けない。後半は余裕あり。"},
"206":{しんどさ:"注意",アホアホ:"―",メモ:"武庫川センターから18ひとつ、5を3本。中山寺は時間余裕なし。"}
}};

const dv={assignments:{
"2480":{車番:"2480",平日前半:"21",平日後半:"211後",土休前半:"25",土休後半:"212後"},
"3445":{車番:"3445",平日前半:"216前",平日後半:"101",土休前半:"210前",土休後半:"115"},
"4443":{車番:"4443",平日前半:"35",平日後半:"219後",土休前半:"27",土休後半:"210後"}
},notes:{
"2480":"ブレーキ強い\nジャジャ馬\n暖房良い",
"3445":"直進不安定\n尻痛い\n排気ブレーキショック",
"4443":"乗りやすい\n暖房よく効く\n排気ブレーキ不要"
}};

function deep(v){return JSON.parse(JSON.stringify(v))}
function load(k,f){
  try{
    const r=localStorage.getItem(k);
    if(!r) return deep(f);
    const p=JSON.parse(r);
    if(k==="itami-sh") return {weekday:{...f.weekday,...(p.weekday||{})},holiday:{...f.holiday,...(p.holiday||{})}};
    if(k==="itami-v") return {assignments:{...f.assignments,...(p.assignments||{})},notes:{...f.notes,...(p.notes||{})}};
    return p;
  }catch(e){return deep(f)}
}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function $(id){return document.getElementById(id)}
function n(v){return String(v||"").trim().toUpperCase().replace(/\s+/g,"")}
function pick(v){const m=String(v||"").match(/\d+/);return m?m[0]:""}
function wait(k){return /^(AF|PF)/.test(String(k))}
function pill(v){
  if(v==="1位") return "pill red";
  if(v==="2位") return "pill orange";
  if(v==="3位") return "pill yellow";
  return "pill";
}

let mode="weekday",res=null,shdb=load("itami-sh",ds),vdb=load("itami-v",dv);

function base(){return mode==="weekday"?wd:hd}
function sh(){return res?((shdb[mode]||{})[String(res.勤番)]||null):null}
function linked(){
  if(!res) return [];
  return Object.values(vdb.assignments).filter(v=>
    pick(mode==="weekday"?v.平日前半:v.土休前半)===res.勤番 ||
    pick(mode==="weekday"?v.平日後半:v.土休後半)===res.勤番
  );
}
function renderMode(){
  $("w").className="btn "+(mode==="weekday"?"dark":"soft");
  $("h").className="btn "+(mode==="holiday"?"dark":"soft");
}
function renderRanks(){
  $("r1").innerHTML=ranks["しんどさランキング"].map((d,i)=>`<button class="btn soft" style="width:100%;margin-top:6px" onclick="openDuty('${d}')">${i+1}位　${d}勤</button>`).join("");
  $("r2").innerHTML=ranks["アホアホランキング"].map((d,i)=>`<button class="btn soft" style="width:100%;margin-top:6px" onclick="openDuty('${d}')">${i+1}位　${d}勤</button>`).join("");
}
window.openDuty=function(d){$("q").value=d; search()}

function render(){
  if(!res){$("res").style.display="none";return}
  $("res").style.display="block";
  const fs=wait(res.勤番)?WF:F;
  $("fields").innerHTML=fs.map((f,i)=>`<div class="field" style="${i%2?'background:#f8fafc':''}"><div class="label">${f}</div><div class="value">${res[f]||"未登録"}</div></div>`).join("");

  const s=sh();
  $("s1").className=pill(s?.しんどさ);
  $("s2").className=pill(s?.アホアホ);
  $("s1").textContent="しんどさ: "+(s?.しんどさ||"―");
  $("s2").textContent="アホアホ: "+(s?.アホアホ||"―");
  $("memo").textContent=s?.メモ||"未登録";

  const lv=linked();
  $("vs").textContent=lv.length?lv.map(v=>v.車番).join(" / "):"該当車両なし";
  $("vl").innerHTML=lv.map(v=>`<div class="box"><strong>車番 ${v.車番}</strong><div class="small" style="margin-top:4px">${mode==="weekday"?v.平日前半:v.土休前半} / ${mode==="weekday"?v.平日後半:v.土休後半}</div><div class="small" style="white-space:pre-wrap;margin-top:6px">${vdb.notes[v.車番]||"癖メモ未登録"}</div></div>`).join("");
  $("editV").style.display=wait(res.勤番)?"none":"inline-block";
}
function search(){
  res=base()[n($("q").value)]||null;
  $("err").style.display=res?"none":"block";
  $("se").style.display="none";
  $("ve").style.display="none";
  render();
}

$("w").onclick=()=>{mode="weekday";res=null;$("err").style.display="none";renderMode();render()}
$("h").onclick=()=>{mode="holiday";res=null;$("err").style.display="none";renderMode();render()}
$("go").onclick=search
$("q").addEventListener("keydown",e=>{if(e.key==="Enter")search()})

$("editS").onclick=()=>{
  if(!res) return;
  const s=sh()||{しんどさ:"―",アホアホ:"―",メモ:""};
  $("es").value=s.しんどさ||"―";
  $("ea").value=s.アホアホ||"―";
  $("em").value=s.メモ||"";
  $("se").style.display="block";
}
$("ss").onclick=()=>{
  if(!res) return;
  const k=String(res.勤番);
  shdb[mode]=shdb[mode]||{};
  shdb[mode][k]={しんどさ:$("es").value||"―",アホアホ:$("ea").value||"―",メモ:$("em").value||""};
  save("itami-sh",shdb);
  $("se").style.display="none";
  render();
}
$("cs").onclick=()=>{$("se").style.display="none"}

$("editV").onclick=()=>{
  if(!res) return;
  const lv=linked(), ex=lv[0], no=ex?.車番||"", as=no?vdb.assignments[no]:null;
  $("vn").value=no;
  $("vf").value=as?(mode==="weekday"?as.平日前半:as.土休前半):String(res.勤番);
  $("vb").value=as?(mode==="weekday"?as.平日後半:as.土休後半):"予";
  $("vnote").value=no?(vdb.notes[no]||""):"";
  $("ve").style.display="block";
}
$("sv").onclick=()=>{
  if(!res||!$("vn").value.trim()) return;
  const no=$("vn").value.trim();
  const cur=vdb.assignments[no]||{車番:no,平日前半:"予",平日後半:"予",土休前半:"予",土休後半:"予"};
  vdb.assignments[no]={...cur,車番:no,...(mode==="weekday"?{平日前半:$("vf").value||"予",平日後半:$("vb").value||"予"}:{土休前半:$("vf").value||"予",土休後半:$("vb").value||"予"})};
  vdb.notes[no]=$("vnote").value||"";
  save("itami-v",vdb);
  $("ve").style.display="none";
  render();
}
$("cv").onclick=()=>{$("ve").style.display="none"}

renderMode();
renderRanks();
</script>
