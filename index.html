<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>伊丹市交通局 勤番検索システム３</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px 16px 40px;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    .app-title {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 18px;
      text-align: center;
    }

    .search-box {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search-row input {
      flex: 1;
      min-width: 220px;
      padding: 14px 16px;
      border: 1px solid #d8dee9;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
    }

    .search-row button {
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .search-row button:hover {
      background: #1d4ed8;
    }

    .hint {
      font-size: 13px;
      color: #666;
      margin-top: 10px;
    }

    .result-area {
      margin-top: 16px;
    }

    .duty-card {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .duty-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .duty-title-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .duty-title {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.1;
    }

    .duty-subtitle {
      font-size: 14px;
      color: #666;
    }

    .duty-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }

    .badge-weekday {
      background: #e8f1ff;
      color: #1d4ed8;
    }

    .badge-holiday {
      background: #ffe9ee;
      color: #be123c;
    }

    .badge-mt {
      background: #eefcf3;
      color: #15803d;
    }

    .badge-at {
      background: #fff7e8;
      color: #b45309;
    }

    .badge-tight {
      background: #ffe9ee;
      color: #be123c;
    }

    .badge-standard {
      background: #fff7db;
      color: #92400e;
    }

    .badge-relaxed {
      background: #e9fbf0;
      color: #047857;
    }

    .badge-hard {
      background: #ffe4e6;
      color: #be123c;
    }

    .badge-medium {
      background: #fef3c7;
      color: #92400e;
    }

    .badge-light {
      background: #ecfdf5;
      color: #047857;
    }

    .result-main {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 16px;
    }

    .result-left,
    .result-right {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .compact-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .summary-item {
      background: #f7f9fc;
      border: 1px solid #e3e8f0;
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
    }

    .summary-label {
      font-size: 12px;
      color: #667085;
      margin-bottom: 6px;
    }

    .summary-value {
      font-size: 15px;
      font-weight: 800;
      color: #1f2937;
    }

    .time-card,
    .info-card {
      background: #f9fbff;
      border: 1px solid #e5ebf5;
      border-radius: 14px;
      padding: 14px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 12px;
      color: #1f2937;
    }

    .time-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .time-item {
      background: #fff;
      border: 1px solid #e7ebf2;
      border-radius: 12px;
      padding: 10px;
    }

    .time-label {
      font-size: 12px;
      color: #667085;
      margin-bottom: 4px;
    }

    .time-value {
      font-size: 18px;
      font-weight: 800;
      color: #111827;
    }

    .info-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid #e7ebf2;
      border-radius: 12px;
    }

    .info-key {
      font-size: 13px;
      color: #667085;
      flex-shrink: 0;
    }

    .info-value {
      font-size: 14px;
      font-weight: 700;
      color: #111827;
      text-align: right;
      word-break: break-word;
    }

    .empty,
    .error {
      background: #fff;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      color: #444;
    }

    .error {
      color: #b42318;
      background: #fff5f5;
      border: 1px solid #fecaca;
    }

    @media (max-width: 768px) {
      .result-main {
        grid-template-columns: 1fr;
      }

      .compact-summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .time-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 520px) {
      .compact-summary,
      .time-grid {
        grid-template-columns: 1fr;
      }

      .duty-head {
        flex-direction: column;
        align-items: stretch;
      }

      .duty-badges {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="app-title">伊丹市交通局 勤番検索システム２</h1>

    <div class="search-box">
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="例：39勤 / 109勤 / 227勤" />
        <button id="searchButton">検索</button>
      </div>
      <div class="hint">勤務番号だけでも検索可能。例：「39」「39勤」どちらでもOK</div>
    </div>

    <div id="resultArea" class="result-area">
      <div class="empty">勤務番号を入力して検索してください。</div>
    </div>
  </div>

  <script>
    let weekdayData = [];
    let holidayData = [];
    let dutyVehicleData = [];
    let dutyHardnessData = [];
    let vehicleData = [];

    async function loadJson(path) {
      const res = await fetch(path);
      if (!res.ok) {
        throw new Error(path + ' の読み込みに失敗しました');
      }
      return await res.json();
    }

    async function init() {
      try {
        const [
          weekday,
          holiday,
          dutyVehicle,
          dutyHardness,
          vehicle
        ] = await Promise.all([
          loadJson('./data/weekday.json'),
          loadJson('./data/holiday.json'),
          loadJson('./data/dutyVehicle.json'),
          loadJson('./data/dutyHardness.json'),
          loadJson('./data/vehicle.json')
        ]);

        weekdayData = Array.isArray(weekday) ? weekday : [];
        holidayData = Array.isArray(holiday) ? holiday : [];
        dutyVehicleData = Array.isArray(dutyVehicle) ? dutyVehicle : [];
        dutyHardnessData = Array.isArray(dutyHardness) ? dutyHardness : [];
        vehicleData = Array.isArray(vehicle) ? vehicle : [];

      } catch (err) {
        document.getElementById('resultArea').innerHTML = `
          <div class="error">初期データの読み込みに失敗しました。<br>${escapeHtml(err.message)}</div>
        `;
        console.error(err);
      }
    }

    function normalizeDutyNumber(input) {
      if (!input) return '';
      return String(input).replace(/\s+/g, '').replace(/勤/g, '');
    }

    function safe(val) {
      if (val === undefined || val === null || val === '') return '―';
      return String(val);
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function findDutyRecord(source, dutyNo) {
      return source.find(row => {
        const values = Object.values(row || {}).map(v => String(v ?? '').trim());
        return values.includes(dutyNo) || values.includes(dutyNo + '勤');
      }) || null;
    }

    function findDutyVehicleRecord(dutyNo) {
      return dutyVehicleData.find(row => {
        const values = Object.values(row || {}).map(v => String(v ?? '').trim());
        return values.includes(dutyNo) || values.includes(dutyNo + '勤');
      }) || null;
    }

    function findDutyHardnessRecord(dutyNo) {
      return dutyHardnessData.find(row => {
        const values = Object.values(row || {}).map(v => String(v ?? '').trim());
        return values.includes(dutyNo) || values.includes(dutyNo + '勤');
      }) || null;
    }

    function findVehicleRecord(vehicleNo) {
      if (!vehicleNo || vehicleNo === '―') return null;
      return vehicleData.find(row => {
        const values = Object.values(row || {}).map(v => String(v ?? '').trim());
        return values.includes(String(vehicleNo).trim());
      }) || null;
    }

    function getTimeValue(record, keys) {
      for (const key of keys) {
        if (record && record[key] !== undefined && record[key] !== null && record[key] !== '') {
          return String(record[key]).trim();
        }
      }
      return '―';
    }

    function getAnyValue(record, keys) {
      for (const key of keys) {
        if (record && record[key] !== undefined && record[key] !== null && record[key] !== '') {
          return record[key];
        }
      }
      return null;
    }

    function toMinutes(hhmm) {
      if (!hhmm || hhmm === '―') return null;
      const m = String(hhmm).match(/^(\d{1,2})[:：](\d{2})$/);
      if (!m) return null;
      return Number(m[1]) * 60 + Number(m[2]);
    }

    function formatMinutes(mins) {
      if (mins === null || mins === undefined || isNaN(mins)) return '―';
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return `${h}時間${m}分`;
    }

    function getRestQuality(restMinutes) {
      if (restMinutes === null || restMinutes === undefined || isNaN(restMinutes)) {
        return { label: '―', className: '' };
      }
      if (restMinutes >= 120) {
        return { label: '余裕あり', className: 'badge-relaxed' };
      } else if (restMinutes < 60) {
        return { label: 'タイト', className: 'badge-tight' };
      } else {
        return { label: '標準', className: 'badge-standard' };
      }
    }

    function getHardnessBadgeClass(value) {
      const text = String(value ?? '').trim();
      if (!text || text === '―') return '';

      if (
        text.includes('しんど') ||
        text.includes('高') ||
        text.includes('重') ||
        text === 'A'
      ) {
        return 'badge-hard';
      }

      if (
        text.includes('中') ||
        text === 'B'
      ) {
        return 'badge-medium';
      }

      return 'badge-light';
    }

    function calculateSummary(record) {
      const start = getTimeValue(record, ['出勤']);
      const firstOut = getTimeValue(record, ['前半出庫', '出庫', '出庫①']);
      const firstIn = getTimeValue(record, ['前半入庫', '入庫', '入庫①']);
      const secondStart = getTimeValue(record, ['後半出勤時間']);
      const secondOut = getTimeValue(record, ['後半出庫', '出庫②']);
      const secondIn = getTimeValue(record, ['後半入庫', '入庫②']);
      const end = getTimeValue(record, ['退勤']);

      const startMin = toMinutes(start);
      const firstInMin = toMinutes(firstIn);
      const secondStartMin = toMinutes(secondStart);
      const endMin = toMinutes(end);

      let actualWork = null;
      let restTime = null;

      if (startMin !== null && endMin !== null) {
        if (firstInMin !== null && secondStartMin !== null) {
          actualWork = (firstInMin - startMin) + (endMin - secondStartMin);
          restTime = secondStartMin - firstInMin;
        } else {
          actualWork = endMin - startMin;
          restTime = 0;
        }
      }

      return {
        start,
        firstOut,
        firstIn,
        secondStart,
        secondOut,
        secondIn,
        end,
        actualWork,
        restTime,
        restQuality: getRestQuality(restTime)
      };
    }

    function renderDutyHtml(record, options) {
      const {
        dayType,
        dutyNo,
        dutyVehicleRecord,
        dutyHardnessRecord,
        vehicleRecord
      } = options;

      const summary = calculateSummary(record);

      const vehicleNo = safe(
        getAnyValue(dutyVehicleRecord, ['車両', '車番', '車号', '車両番号'])
      );

      const transmission = safe(
        getAnyValue(vehicleRecord, ['MTAT', '変速', 'ミッション', 'mission', 'AT/MT'])
      );

      const hardness = safe(
        getAnyValue(dutyHardnessRecord, ['しんどさ', 'hardness', '評価', 'ランク'])
      );

      const badges = [];

      badges.push(
        `<span class="badge ${dayType === 'holiday' ? 'badge-holiday' : 'badge-weekday'}">${dayType === 'holiday' ? '休日' : '平日'}</span>`
      );

      if (transmission !== '―') {
        if (String(transmission).toUpperCase().includes('MT')) {
          badges.push(`<span class="badge badge-mt">MT</span>`);
        } else if (String(transmission).toUpperCase().includes('AT')) {
          badges.push(`<span class="badge badge-at">AT</span>`);
        }
      }

      if (hardness !== '―') {
        badges.push(
          `<span class="badge ${getHardnessBadgeClass(hardness)}">しんどさ ${escapeHtml(hardness)}</span>`
        );
      }

      return `
        <div class="duty-card">
          <div class="duty-head">
            <div class="duty-title-wrap">
              <div class="duty-title">${escapeHtml(dutyNo)}勤</div>
              <div class="duty-subtitle">勤務情報を表示しています</div>
            </div>
            <div class="duty-badges">
              ${badges.join('')}
            </div>
          </div>

          <div class="result-main">
            <div class="result-left">

              <div class="compact-summary">
                <div class="summary-item">
                  <div class="summary-label">勤務区分</div>
                  <div class="summary-value">${dayType === 'holiday' ? '休日' : '平日'}</div>
                </div>

                <div class="summary-item">
                  <div class="summary-label">実働時間</div>
                  <div class="summary-value">${escapeHtml(formatMinutes(summary.actualWork))}</div>
                </div>

                <div class="summary-item">
                  <div class="summary-label">休憩時間</div>
                  <div class="summary-value">${escapeHtml(formatMinutes(summary.restTime))}</div>
                </div>

                <div class="summary-item">
                  <div class="summary-label">休憩の質</div>
                  <div class="summary-value">
                    ${summary.restQuality.label === '―'
                      ? '―'
                      : `<span class="badge ${summary.restQuality.className}">${escapeHtml(summary.restQuality.label)}</span>`
                    }
                  </div>
                </div>
              </div>

              <div class="time-card">
                <div class="card-title">時間情報</div>
                <div class="time-grid">
                  <div class="time-item">
                    <div class="time-label">出勤</div>
                    <div class="time-value">${escapeHtml(summary.start)}</div>
                  </div>
                  <div class="time-item">
                    <div class="time-label">前半出庫</div>
                    <div class="time-value">${escapeHtml(summary.firstOut)}</div>
                  </div>
                  <div class="time-item">
                    <div class="time-label">前半入庫</div>
                    <div class="time-value">${escapeHtml(summary.firstIn)}</div>
                  </div>
                  <div class="time-item">
                    <div class="time-label">前半退勤 / 後半出勤</div>
                    <div class="time-value">${escapeHtml(summary.secondStart)}</div>
                  </div>
                  <div class="time-item">
                    <div class="time-label">後半出庫</div>
                    <div class="time-value">${escapeHtml(summary.secondOut)}</div>
                  </div>
                  <div class="time-item">
                    <div class="time-label">後半入庫</div>
                    <div class="time-value">${escapeHtml(summary.secondIn)}</div>
                  </div>
                  <div class="time-item">
                    <div class="time-label">退勤</div>
                    <div class="time-value">${escapeHtml(summary.end)}</div>
                  </div>
                </div>
              </div>
            </div>

            <div class="result-right">
              <div class="info-card">
                <div class="card-title">補足情報</div>
                <div class="info-list">
                  <div class="info-row">
                    <div class="info-key">車両</div>
                    <div class="info-value">${escapeHtml(vehicleNo)}</div>
                  </div>
                  <div class="info-row">
                    <div class="info-key">変速</div>
                    <div class="info-value">${escapeHtml(transmission)}</div>
                  </div>
                  <div class="info-row">
                    <div class="info-key">しんどさ</div>
                    <div class="info-value">${escapeHtml(hardness)}</div>
                  </div>
                </div>
              </div>

              <div class="info-card">
                <div class="card-title">元データ確認</div>
                <div class="info-list">
                  ${Object.entries(record).map(([key, val]) => `
                    <div class="info-row">
                      <div class="info-key">${escapeHtml(key)}</div>
                      <div class="info-value">${escapeHtml(safe(val))}</div>
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function searchDuty() {
      const input = document.getElementById('searchInput').value;
      const dutyNo = normalizeDutyNumber(input);
      const resultArea = document.getElementById('resultArea');

      if (!dutyNo) {
        resultArea.innerHTML = `<div class="empty">勤務番号を入力してください。</div>`;
        return;
      }

      const weekdayRecord = findDutyRecord(weekdayData, dutyNo);
      const holidayRecord = findDutyRecord(holidayData, dutyNo);

      let record = null;
      let dayType = 'weekday';

      if (weekdayRecord) {
        record = weekdayRecord;
        dayType = 'weekday';
      } else if (holidayRecord) {
        record = holidayRecord;
        dayType = 'holiday';
      }

      if (!record) {
        resultArea.innerHTML = `<div class="empty">${escapeHtml(dutyNo)}勤 は見つかりませんでした。</div>`;
        return;
      }

      const dutyVehicleRecord = findDutyVehicleRecord(dutyNo);
      const dutyHardnessRecord = findDutyHardnessRecord(dutyNo);

      const vehicleNo = safe(
        getAnyValue(dutyVehicleRecord, ['車両', '車番', '車号', '車両番号'])
      );
      const vehicleRecord = findVehicleRecord(vehicleNo);

      resultArea.innerHTML = renderDutyHtml(record, {
        dayType,
        dutyNo,
        dutyVehicleRecord,
        dutyHardnessRecord,
        vehicleRecord
      });
    }

    document.getElementById('searchButton').addEventListener('click', searchDuty);
    document.getElementById('searchInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        searchDuty();
      }
    });

    init();
  </script>
</body>
</html>
