<!DOCTYPE html>
<html lang="ja">
<head>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伊丹市交通局 勤番検索</title>
<style>
:root{
  --bg:#0d241b;
  --bg2:#0a1a14;
  --panel:#163629;
  --panel2:#1a4031;
  --panel3:#204c3b;
  --accent:#2aa876;
  --accent-strong:#39c48d;
  --line:#2a5f4c;
  --line-soft:rgba(255,255,255,0.06);
  --text:#e8f5ef;
  --muted:#9fc5b5;
  --danger:#dc2626;
  --warn:#d97706;
  --info:#2563eb;
  --ok:#15803d;
  --shadow:0 20px 40px rgba(0,0,0,0.18);
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:"Noto Sans JP",sans-serif;
  background:linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--text);
}
.container{
  max-width:940px;
  margin:0 auto;
  padding:20px 16px 40px;
}
.hero{
  background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));
  border:1px solid var(--line);
  border-radius:16px;
  padding:18px;
  box-shadow:var(--shadow);
  margin-bottom:16px;
}
.hero-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
}
.header{
  font-size:30px;
  font-weight:800;
  letter-spacing:0.04em;
  line-height:1.2;
  margin-bottom:6px;
  font-family:"Orbitron","Noto Sans JP",sans-serif;
}
.header .line2{
  display:block;
  font-size:36px;
  font-weight:800;
  letter-spacing:0.08em;
}
.sub{
  font-size:12px;
  color:var(--muted);
  margin:0;
}
.system-badge{
  border:1px solid var(--line);
  background:rgba(255,255,255,0.03);
  border-radius:10px;
  padding:10px 12px;
  min-width:132px;
}
.system-badge-title{
  font-size:10px;
  color:var(--muted);
  letter-spacing:0.08em;
  margin-bottom:4px;
}
.system-badge-value{
  font-family:"JetBrains Mono",monospace;
  font-size:18px;
  font-weight:700;
}
.toolbar{
  display:grid;
  grid-template-columns:180px 1fr 92px;
  gap:10px;
  margin-top:16px;
}
.mode-toggle{
  display:flex;
  border:1px solid var(--line);
  border-radius:10px;
  overflow:hidden;
  background:rgba(255,255,255,0.02);
}
.mode-toggle button{
  flex:1;
  padding:12px;
  background:transparent;
  border:none;
  color:var(--muted);
  font-size:14px;
  cursor:pointer;
  font-weight:700;
}
.mode-toggle button.active{
  background:var(--accent);
  color:#fff;
}
#weekdayBtn.active{
  background:#2563eb;
  color:#fff;
}

#holidayBtn.active{
  background:#f472b6;
}

.search-box{
  display:flex;
  gap:10px;
}
.search-box input{
  flex:1;
  height:46px;
  padding:0 14px;
  border-radius:10px;
  border:1px solid #d1d5db;
  background:#ffffff;
  color:#111827;
  font-size:17px;
  font-family:"JetBrains Mono",monospace;
  font-weight:700;
}
.search-box input::placeholder{color:#9ca3af;}
.search-box input:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(42,168,118,0.15);
}
.search-box button,
.action-btn{
  height:46px;
  padding:0 16px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:#fff;
  font-weight:700;
  cursor:pointer;
}
.action-btn{
  background:var(--panel3);
  border:1px solid var(--line);
}
.result-headline{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:16px 2px 8px;
}
.result-title {
  font-size: 28px;
  font-weight: bold;
  letter-spacing: 1px;
}
.result-status{
  font-size:12px;
  color:var(--muted);
}
.result{
  background:var(--panel2);
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  box-shadow:var(--shadow);
}
.result-main{
  display:grid;
  grid-template-columns:1.3fr 0.9fr;
  gap:12px;
}
.time-card,
.info-card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
}
.time-card {
  background: var(--panel);
  border: 1px solid var(--accent);
  border-radius: 12px;
  padding: 12px;
  box-shadow: 0 0 0 1px rgba(57,196,141,0.08);
}
.duty-head h3 {
  font-size: 34px;
  font-weight: 900;
  letter-spacing: 1px;
}
.badges{display:flex; flex-wrap:wrap; gap:6px; margin-top:6px;}
.start-time,
.end-time{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:110px;
  font-family:"JetBrains Mono",monospace;
  font-size:16px;
  font-weight:700;
  color:#c8f5df;
  background:rgba(38,160,111,0.15);
  padding:6px 10px;
  border-radius:8px;
  border:1px solid var(--line);
}
.end-time{margin-left:6px;}
.badge-mid,
.badge-fatigue,
.badge-access,
.badge-ramp{
  font-size:11px;
  color:#fff;
  padding:3px 7px;
  border-radius:999px;
}
.badge-mid { background: var(--warn); }
.badge-fatigue.high { background: var(--danger); }
.badge-fatigue.mid { background: #ca8a04; }
.badge-fatigue.low { background: var(--ok); }
.badge-access { background: #7c3aed; }
.badge-ramp { background: var(--info); }

/* ←ここに追加 */

.badge-mode { background: #0f766e; }
.badge-mission.at { background: #475569; }
.badge-mission.mt { background: #b45309; }
.vehicle-link{
  background:none;
  border:none;
  padding:0;
  margin:0;
  color:var(--accent-strong);
  font:inherit;
  font-weight:700;
  cursor:pointer;
  text-decoration:underline;
}

.vehicle-link:hover{
  opacity:0.85;
}
  
  
.compact-summary {
  margin-top: 6px;
  margin-bottom: 10px;
}


.compact-summary .summary-box {
  min-height: 70px;
}

.badge-rest.long { background: #166534; }
.badge-rest.normal { background: #a16207; }
.badge-rest.tight { background: #b91c1c; }
.badge-mission.at { background: #475569; }
.badge-mission.mt { background: #b45309; }
  
.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.summary-box {
  background: rgba(255,255,255,0.025);
  border: 1px solid var(--line-soft);
  border-radius: 8px;
  padding: 8px 8px;
  min-height: auto;
}
.summary-label {
  font-size: 9px;
  color: var(--muted);
  margin-bottom: 3px;
  letter-spacing: 0.04em;
}

.summary-value {
  font-family: "JetBrains Mono", monospace;
  font-size: 14px;
  font-weight: 700;
}
.item-list{display:grid; gap:8px;}
.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  border:1px solid var(--line-soft);
  border-radius:10px;
  font-size:14px;
  background:rgba(255,255,255,0.02);
}
.item.primary{
  background:linear-gradient(135deg,#1f7a5a,#26a06f);
  color:#fff;
  font-weight:700;
  border-color:transparent;
}
.item.secondary{
  background:rgba(38,160,111,0.15);
  border-left:4px solid #26a06f;
  font-weight:700;
}
.item-label {
  color: #cfe9dd;
  font-weight: 500;
}

.item.primary .item-label,
.item.secondary .item-label{color:#eafff5;}
.item-value {
  font-family: "JetBrains Mono", monospace;
  font-weight: 800;
  font-size: 15px;
}
.info-sections{
  display:grid;
  gap:10px;
}
.info-card-title{
  font-size:11px;
  color:var(--muted);
  margin-bottom:8px;
  letter-spacing:0.08em;
}
.info-card-grid{display:grid; gap:6px;}
.info-row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:6px 0;
  border-bottom:1px solid var(--line-soft);
  font-size:13px;
}
.info-row:last-child{border-bottom:none;}
.info-label{color:var(--muted);}
.info-value{font-weight:700; text-align:right;}
.note-list{
  margin:0;
  padding-left:18px;
  display:grid;
  gap:6px;
}
.note-list li{line-height:1.5;}
.empty{
  color:var(--muted);
  padding:18px;
  text-align:center;
  background:var(--panel2);
  border:1px solid var(--line);
  border-radius:14px;
}

.search-type-toggle{
  display:inline-flex;
  border:1px solid var(--line);
  border-radius:10px;
  overflow:hidden;
  background:rgba(255,255,255,0.02);
  margin-top:16px;
  margin-bottom:10px;
}

.search-type-toggle button{
  padding:10px 16px;
  background:transparent;
  border:none;
  color:var(--muted);
  font-size:14px;
  cursor:pointer;
  font-weight:700;
}

.search-type-toggle button.active{
  background:var(--accent);
  color:#fff;
}  
.footer{
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:10px;
  color:#ffffff;
  margin-top:20px;
  opacity:0.8;
  white-space:nowrap;
  letter-spacing:0.02em;
}
@media(max-width:760px){
  .toolbar{grid-template-columns:1fr;}
  .result-main{grid-template-columns:1fr;}
  .hero-top{flex-direction:column;}
}
@media(max-width:520px){
  .container{padding:14px 12px 28px;}
  .header{font-size:24px;}
  .header .line2{font-size:28px;}
  .duty-head{flex-direction:column;}
  .summary-grid{grid-template-columns:1fr;}
  .start-time,.end-time{min-width:unset; width:auto;}
  .footer{font-size:9px;}
}

@media(max-width:760px){
  .dev-diff-row{
    grid-template-columns:1fr;
  }
}

.ticker-wrap {
  overflow: hidden;
  background: #000;
  color: #00ff66;
  font-weight: bold;
  border-radius: 8px;
  margin-bottom: 10px;
  padding: 6px 0;
}

.ticker {
  width: 100%;
}

.ticker-inner {
  display: inline-block;
  white-space: nowrap;
  padding-left: 100%;
  animation: tickerMove 12s linear infinite;
}
.ticker-status {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 6px;
  color: #dff7df;
  letter-spacing: 0.04em;
}
.progress-wrap {
  margin-top: 8px;
}

.progress-label {
  font-size: 12px;
  margin-bottom: 4px;
  color: #cfe9cf;
}

.progress-bar {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.2);
  border-radius: 999px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #7CFC00, #00FF7F);
  transition: width 0.5s linear;
}


  
  
@keyframes tickerMove {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* 緊急時 */
.ticker-wrap.urgent {
  color: #ff2b2b;
}

  
</style>
</head>



  
<body>
<div class="container">
  <div class="hero">
    <div class="hero-top">
      <div>
        <div class="header">伊丹市交通局<br><span class="line2">勤番検索ツール ver.3.1</span></div>
        <p class="sub">Duty Search System / Professional Edition</p>
      </div>
      <div class="system-badge">
        <div class="system-badge-title">CURRENT MODE</div>
        <div class="system-badge-value" id="modeLabel">WEEKDAY</div>
      </div>
    </div>
<div class="search-type-toggle">
  <button id="dutySearchBtn" class="active" type="button">勤番検索</button>
  <button id="vehicleSearchBtn" type="button">車両検索</button>
</div>

    <div class="toolbar">
      <div class="mode-toggle">
        <button id="weekdayBtn" class="active" type="button">平日</button>
        <button id="holidayBtn" type="button">休日</button>
      </div>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="例: 39 / 26-2" inputmode="text" autocomplete="off">
        <button id="searchBtn" type="button">検索</button>
      </div>

      <button id="clearBtn" class="action-btn" type="button">クリア</button>
    </div>
  </div>

 <div class="result-headline">
    <div class="result-title">検索結果</div>
    <div class="result-status" id="resultStatus">待機中</div>
  </div>

<div id="tickerWrap" class="ticker-wrap" style="display:none;">
  <div id="tickerStatus" class="ticker-status">待機中</div>

  <div class="ticker">
    <div id="tickerText" class="ticker-inner">待機中</div>
  </div>

  <div id="progressWrap" class="progress-wrap" style="display:none;">
    <div class="progress-label" id="progressLabel">進行状況</div>
    <div class="progress-bar">
      <div id="progressFill" class="progress-fill"></div>
    </div>
  </div>
</div>

  <div id="result"></div>
</div>
  
 
<div class="footer">© 2026 Itami Duty System | Developed by Saneisha Co., Ltd.</div>

<script>
let mode = 'weekday';

const weekdayBtn = document.getElementById('weekdayBtn');
const holidayBtn = document.getElementById('holidayBtn');
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const clearBtn = document.getElementById('clearBtn');
const result = document.getElementById('result');
const modeLabel = document.getElementById('modeLabel');
const resultStatus = document.getElementById('resultStatus');
const dutySearchBtn = document.getElementById('dutySearchBtn');
const vehicleSearchBtn = document.getElementById('vehicleSearchBtn');

let searchType = 'duty';
let vehicleDb = {};
let slopeStopsDb = {};
let dutyVehicleDb = { weekday: {}, holiday: {} };
let dutyHardnessDb = { weekday: {}, holiday: {} };
let datasets = { weekday: {}, holiday: {} };

let weekdayLoaded = false;
let vehicleLoaded = false;
let slopeStopsLoaded = false;
let dutyVehicleLoaded = false;
let dutyHardnessLoaded = false;
let dutyDetailDb = { weekday: {}, holiday: {} };
let dutyDetailLoaded = false;
  
const DATA_FILES = {
  weekday: './data/weekday.json',
  holiday: './data/holiday.json',
  vehicle: './data/vehicle.json',
  slopeStops: './data/slope_stops.json',
  dutyVehicle: './data/dutyVehicle.json',
  dutyHardness: './data/dutyHardness.json',
  dutyDetail: './data/dutyDetail.json'
};

const FALLBACK_DATA = {
  vehicle: {
    '5394': {
      'ミッション': 'AT',
      '癖': ['素直で運転しやすい', '排気ブレーキ推奨'],
      '注意': [],
      'メモ': 'サンプル'
    }
  },
  slopeStops: {
    '39': ['伊丹中央', '昆陽里'],
    '109': ['阪急伊丹'],
    '227': ['瑞穂小学校前']
  },
  dutyVehicle: {
    weekday: {
      '39': { 前半: [{ 車番: '4645' }], 後半: [{ 車番: '5394' }] },
      '109': { 前半: [{ 車番: '4439' }], 後半: [{ 車番: '5888' }] }
    },
    holiday: {
      '39': { 前半: [{ 車番: '4441' }], 後半: [{ 車番: '5477' }] }
    }
  },
  dutyHardness: {
    weekday: {
      '39': {
        疲労度: '高',
        障害者対応: '多い',
        スロープ対応: 'あり',
        メモ: ['高齢者多い', 'バスマニア対応あり']
      },
      '109': {
        疲労度: '高',
        障害者対応: '少しあり',
        スロープ対応: '多い',
        メモ: ['連続スロープ対応で疲れる']
      }
    },
    holiday: {
      '39': {
        疲労度: '中',
        障害者対応: '少しあり',
        スロープ対応: 'あり',
        メモ: []
      }
    }
  },
  weekday: {
    '39': { 出勤: '7:24', 前半出庫: '7:49', 前半入庫: '11:24', 後半出庫: '13:02', 後半入庫: '15:52', 退勤: '16:02' },
    '109': { 出勤: '12:54', 前半出庫: '13:19', 前半入庫: '16:30', 後半出庫: '17:39', 後半入庫: '21:19', 退勤: '21:29' }
  },
  holiday: {
    '39': { 出勤: '8:45', 前半出庫: '9:10', 前半入庫: '12:26', 後半出庫: '14:13', 後半入庫: '17:13', 退勤: '17:23' }
  }
};
function normalizeDutyData(data) {
  return data && typeof data === 'object' ? data : {};
}

function normalizeVehicleData(data) {
  return data && typeof data === 'object' ? data : {};
}

function normalizeModeMapData(data) {
  if (!data || typeof data !== 'object') {
    return { weekday: {}, holiday: {} };
  }
  return {
    weekday: data.weekday && typeof data.weekday === 'object' ? data.weekday : {},
    holiday: data.holiday && typeof data.holiday === 'object' ? data.holiday : {}
  };
}

function normalizeVehicleAssignment(entry) {
  if (!entry || typeof entry !== 'object') return { 前半: [], 後半: [] };
  return {
    前半: Array.isArray(entry.前半) ? entry.前半 : [],
    後半: Array.isArray(entry.後半) ? entry.後半 : []
  };
}

function normalizeHardnessEntry(entry) {
  if (!entry || typeof entry !== 'object') {
    return {
      疲労度: '―',
      障害者対応: '―',
      スロープ対応: '―',
      系統: [],
      乗車バス停: [],
      乗客特長: [],
      メモ: []
    };
  }
  return {
    疲労度: entry.疲労度 || '―',
    障害者対応: entry.障害者対応 || '―',
    スロープ対応: entry.スロープ対応 || '―',
    系統: Array.isArray(entry.系統) ? entry.系統 : [],
    乗車バス停: Array.isArray(entry.乗車バス停) ? entry.乗車バス停 : [],
    乗客特長: Array.isArray(entry.乗客特長) ? entry.乗客特長 : [],
    メモ: Array.isArray(entry.メモ) ? entry.メモ : []
  };
}
 
async function fetchJson(path) {
  const response = await fetch(path, { cache: 'no-store' });
  if (!response.ok) {
    throw new Error(`${path} の読込に失敗 (${response.status})`);
  }
  return response.json();
}

async function loadExternalData() {
  resultStatus.textContent = 'DB読込中';

  // 初期化
  weekdayLoaded = false;
  vehicleLoaded = false;
  dutyVehicleLoaded = false;
  dutyHardnessLoaded = false;

  // 勤務DB
  try {
    const weekdayJson = await fetchJson(DATA_FILES.weekday);
    const holidayJson = await fetchJson(DATA_FILES.holiday);

    datasets = {
      weekday: normalizeDutyData(weekdayJson),
      holiday: normalizeDutyData(holidayJson)
    };

    weekdayLoaded = true;
  } catch (e) {
    console.error('勤務DB読込失敗', e);
    datasets = {
      weekday: {},
      holiday: {}
    };
  }

  // 車両DB
  try {
    const vehicleJson = await fetchJson(DATA_FILES.vehicle);
    vehicleDb = normalizeVehicleData(vehicleJson);
    vehicleLoaded = true;
  } catch (e) {
    console.error('車両DB読込失敗', e);
    vehicleDb = {};
  }
  // スロープ停留所DB
try {
  const res = await fetch(DATA_FILES.slopeStops);
  if (!res.ok) throw new Error('slope_stops.json 読込失敗');
  slopeStopsDb = await res.json();
  slopeStopsLoaded = true;
} catch (err) {
  console.error('slopeStops DB load error:', err);
  slopeStopsDb = FALLBACK_DATA.slopeStops || {};
  slopeStopsLoaded = false;
}


  
  // 割付DB
  try {
    const dutyVehicleJson = await fetchJson(DATA_FILES.dutyVehicle);
    dutyVehicleDb = normalizeModeMapData(dutyVehicleJson);
    dutyVehicleLoaded = true;
  } catch (e) {
    console.error('割付DB読込失敗', e);
    dutyVehicleDb = { weekday: {}, holiday: {} };
  }

  // しんどさDB
  try {
    const dutyHardnessJson = await fetchJson(DATA_FILES.dutyHardness);
    dutyHardnessDb = normalizeModeMapData(dutyHardnessJson);
    dutyHardnessLoaded = true;
  } catch (e) {
    console.error('しんどさDB読込失敗', e);
    dutyHardnessDb = { weekday: {}, holiday: {} };
  }

  // 運行詳細DB
  try {
    const dutyDetailJson = await fetchJson(DATA_FILES.dutyDetail);
    dutyDetailDb = normalizeModeMapData(dutyDetailJson);
    dutyDetailLoaded = true;
  } catch (e) {
    console.error('運行詳細DB読込失敗', e);
    dutyDetailDb = { weekday: {}, holiday: {} };
  }

  
 // 状態表示
const dbStatus = [];

function getFatigueClass(level) {
  if (level === '高') return 'high';
  if (level === '中') return 'mid';
  return 'low';
}

function timeToMinutes(t) {
  if (!t || typeof t !== 'string' || !t.includes(':')) return 0;
  const [h, m] = t.split(':').map(Number);
  if (Number.isNaN(h) || Number.isNaN(m)) return 0;
  return h * 60 + m;
}

function minutesToTime(min) {
  if (!Number.isFinite(min) || min < 0) return '―';
  const h = Math.floor(min / 60);
  const m = min % 60;
  return `${h}時間${m}分`;
}

function calcSummary(duty) {
  const start = timeToMinutes(duty['出勤']);
  const end = timeToMinutes(duty['退勤']);

  const frontStart = timeToMinutes(duty['前半出庫']);
  const frontEnd = timeToMinutes(duty['前半入庫']);

  const backStart = timeToMinutes(duty['後半出庫']);
  const backEnd = timeToMinutes(duty['後半入庫']);

  const frontWork = Math.max(0, frontEnd - frontStart);
  const backWork = Math.max(0, backEnd - backStart);

  const total拘束 = Math.max(0, end - start);
  const total実働 = frontWork + backWork;
  const 休憩 = Math.max(0, total拘束 - total実働);

  let restQuality = '標準';
  if (休憩 >= 120) restQuality = '余裕あり';
  else if (休憩 < 60) restQuality = 'タイト';

  return {
    front: minutesToTime(frontWork),
    back: minutesToTime(backWork),
    rest: minutesToTime(休憩),
    restQuality
  };
}

function searchVehicle() {
  const input = searchInput.value.trim();
  if (!input) {
    result.innerHTML = '';
    resultStatus.textContent = '待機中';
    return;
  }

  if (vehicleDb[input]) {
    result.innerHTML = renderVehicleSearchResult(input, vehicleDb[input]);
    resultStatus.textContent = `車番 ${input} を表示中`;
    return;
  }

  const keyword = input.toLowerCase();
  const matched = Object.entries(vehicleDb).filter(([carNo, vehicle]) => {
    const traits = Array.isArray(vehicle.癖) ? vehicle.癖.join(' ') : '';
    const cautions = Array.isArray(vehicle.注意) ? vehicle.注意.join(' ') : '';
    const memo = vehicle.メモ || '';
    const mission = vehicle.ミッション || '';
    const text = `${carNo} ${traits} ${cautions} ${memo} ${mission}`.toLowerCase();
    return text.includes(keyword);
  });

  if (!matched.length) {
    result.innerHTML = '<div class="empty">該当する車両はありません</div>';
    resultStatus.textContent = '該当なし';
    return;
  }

  result.innerHTML = matched.map(([carNo, vehicle]) => renderVehicleSearchResult(carNo, vehicle)).join('');
  resultStatus.textContent = `${matched.length}件の車両が見つかりました`;
}


  
function findDutiesByVehicle(carNo) {
  const results = [];

  ['weekday', 'holiday'].forEach(modeKey => {
    const modeLabel = modeKey === 'weekday' ? '平日' : '休日';
    const modeData = dutyVehicleDb[modeKey] || {};

    Object.entries(modeData).forEach(([dutyNo, assignment]) => {
      const normalized = normalizeVehicleAssignment(assignment);

      const frontHit = normalized.前半.some(item => String(item.車番 || '') === String(carNo));
      const backHit = normalized.後半.some(item => String(item.車番 || '') === String(carNo));

      if (frontHit) {
        results.push({
          mode: modeKey,
          modeLabel,
          dutyNo,
          part: '前半'
        });
      }

      if (backHit) {
        results.push({
          mode: modeKey,
          modeLabel,
          dutyNo,
          part: '後半'
        });
      }
    });
  });

  return results;
}

function searchDuty() {

 if (!input) {

  resultStatus.textContent = '待機中';
  stopTicker();
  return;
}

    String.fromCharCode(s.charCodeAt(0) - 0xFEE0)
  );

  const normalizedInput = input.replace(/勤$/i, '');
  const data = datasets[mode] || {};

  let duty = data[normalizedInput];
  let dutyKey = normalizedInput;

  const baseInput = normalizedInput.split('-')[0];

  if (!duty) {
    if (data[baseInput]) {
      duty = data[baseInput];
      dutyKey = baseInput;
    } else if (data[`${baseInput}-1`]) {
      duty = data[`${baseInput}-1`];
      dutyKey = `${baseInput}-1`;
    } else if (data[`${baseInput}-2`]) {
      duty = data[`${baseInput}-2`];
      dutyKey = `${baseInput}-2`;
    }
  }

if (!duty) {

  resultStatus.textContent = '未登録';
  stopTicker();
  return;
}

  const baseDutyNo = dutyKey.split('-')[0];
  const slopeStops = slopeStopsDb?.[dutyKey] 
  || slopeStopsDb?.[baseDutyNo] 
  || [];
  const hardness = dutyHardnessDb[mode]?.[dutyKey] || dutyHardnessDb[mode]?.[baseDutyNo];

  startTicker(duty);
}
  
function updateTicker(text) {
  const el = document.getElementById('tickerText');
  if (!el) return;
  el.textContent = text;
}

function getNextEvent(duty) {
  const now = new Date();
  
  const events = [
    { label: '出勤', time: duty.出勤 },
    { label: '前半出庫', time: duty.前半出庫 },
    { label: '前半入庫', time: duty.前半入庫 },
    { label: '前半退勤', time: duty.前半退勤 },
    { label: '後半出勤時間', time: duty.後半出勤時間 },
    { label: '後半出庫', time: duty.後半出庫 },
    { label: '後半入庫', time: duty.後半入庫 },
    { label: '退勤', time: duty.退勤 }
  ]
    .filter(e => e.time)
    .map(e => {
      const [h, m] = e.time.split(':').map(Number);
      const d = new Date();
      d.setHours(h, m, 0, 0);
      return { ...e, date: d };
    })
    .sort((a, b) => a.date - b.date);

  for (let i = 0; i < events.length; i++) {
    if (events[i].date > now) {
      return {
        next: events[i],
        prev: events[i - 1] || null
      };
    }
  }

  return null;
}
  
let tickerTimer = null;
  
function stopTicker() {
  if (tickerTimer) {
    clearInterval(tickerTimer);
    tickerTimer = null;
  }

  const wrap = document.getElementById('tickerWrap');
  const status = document.getElementById('tickerStatus');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressLabel = document.getElementById('progressLabel');

  if (wrap) {
    wrap.style.display = 'none';
    wrap.classList.remove('urgent');
  }

  if (status) status.textContent = '待機中';
  if (progressWrap) progressWrap.style.display = 'none';
  if (progressFill) progressFill.style.width = '0%';
  if (progressLabel) progressLabel.textContent = '進行状況';
}
  
function startTicker(duty) {
  if (tickerTimer) clearInterval(tickerTimer);

  const wrap = document.getElementById('tickerWrap');
  if (wrap) {
    wrap.style.display = 'block';
  }

  function renderTickerNow() {
    const eventInfo = getNextEvent(duty);
    const wrap = document.getElementById('tickerWrap');
    const status = document.getElementById('tickerStatus');
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');
    const now = new Date();

    const startTime = duty.出勤;
    let isBeforeStart = false;

  if (startTime) {
    const [h, m] = startTime.split(':').map(Number);
    const startDate = new Date();
    startDate.setHours(h, m, 0, 0);

  if (now < startDate) {
    isBeforeStart = true;
  }
}
    if (!eventInfo) {
      updateTicker('本日の勤務は終了しました 👍');
      if (status) status.textContent = '現在：勤務終了';
      if (wrap) wrap.classList.remove('urgent');
      if (progressWrap) progressWrap.style.display = 'none';
      if (progressFill) progressFill.style.width = '100%';
      if (progressLabel) progressLabel.textContent = '勤務完了';
      return;
    }
    const next = eventInfo.next;
    const prev = eventInfo.prev;
    const diff = next.date - now;

    const min = Math.floor(diff / 60000);
    const sec = Math.floor((diff % 60000) / 1000);

    let percent = 0;
    if (prev) {
      const total = next.date - prev.date;
      const passed = now - prev.date;
      percent = Math.max(0, Math.min(100, (passed / total) * 100));
    }

    if (progressWrap) progressWrap.style.display = 'block';
    if (progressFill) progressFill.style.width = `${percent}%`;
    if (progressLabel) {
      if (prev) {
        progressLabel.textContent = `${prev.label} → ${next.label}　${Math.round(percent)}%`;
      } else {
        progressLabel.textContent = `${next.label} まで ${Math.round(percent)}%`;
      }
    }

   if (isBeforeStart) {
  const today = new Date();
  const dateText = `${today.getMonth() + 1}月${today.getDate()}日`;

  updateTicker(`📅 ${dateText}です。本日も『安全運行』で稼ぎましょう！🚍　出勤まであと ${min}分${sec}秒`);
} else {
  updateTicker(`次：${next.label} ${next.time}　あと ${min}分${sec}秒`);
}

    if (status) {
      if (
        next.label === '前半出庫' ||
        next.label === '前半入庫' ||
        next.label === '前半退勤' ||
        next.label === '後半入庫' ||
        next.label === '退勤'
      ) {
        status.textContent = '現在：勤務中';
      } else if (
        next.label === '後半出勤時間' ||
        next.label === '後半出庫'
      ) {
        status.textContent = '現在：休憩中';
      } else {
        status.textContent = '現在：進行中';
      }
    }

    if (wrap) {
      if (diff <= 5 * 60 * 1000) {
        wrap.classList.add('urgent');
      } else {
        wrap.classList.remove('urgent');
      }
    }
  }

  renderTickerNow();
  tickerTimer = setInterval(renderTickerNow, 1000);
}


  
function runSelfTests() {
  console.assert(typeof renderDutyHtml === 'function', 'renderDutyHtml should exist');
  console.assert(typeof loadExternalData === 'function', 'loadExternalData should exist');
  console.assert(DATA_FILES.dutyHardness.includes('dutyHardness.json'), 'dutyHardness path should be configured');

  const originalVehicleDb = vehicleDb;
  const originalDutyVehicleDb = dutyVehicleDb;
  const originalDutyHardnessDb = dutyHardnessDb;
  const originalMode = mode;

  try {
    vehicleDb = structuredClone(FALLBACK_DATA.vehicle);
    dutyVehicleDb = structuredClone(FALLBACK_DATA.dutyVehicle);
    dutyHardnessDb = structuredClone(FALLBACK_DATA.dutyHardness);
    mode = 'weekday';

    const html = renderDutyHtml('39', FALLBACK_DATA.weekday['39']);
    console.assert(html.includes('前半車両情報'), 'should render front vehicle card');
    console.assert(html.includes('後半車両情報'), 'should render rear vehicle card');
    console.assert(html.includes('勤務特性'), 'should render duty traits card');
    console.assert(html.includes('疲労度 高'), 'should render fatigue badge');
    console.assert(html.includes('障害者対応 多い'), 'should render accessibility badge');
    console.assert(html.includes('スロープ あり'), 'should render ramp badge');
    console.assert(html.includes('4645'), 'should render assigned front vehicle');
    console.assert(html.includes('5394'), 'should render assigned rear vehicle');

    const normalizedTraits = normalizeHardnessEntry(null);
    console.assert(normalizedTraits.疲労度 === '―', 'normalizeHardnessEntry should return default fatigue');
    console.assert(Array.isArray(normalizedTraits.メモ), 'normalizeHardnessEntry should return notes array');

    const normalizedVehicles = normalizeVehicleAssignment(null);
    console.assert(Array.isArray(normalizedVehicles.前半), 'normalizeVehicleAssignment should return front array');
    console.assert(Array.isArray(normalizedVehicles.後半), 'normalizeVehicleAssignment should return rear array');
  } finally {
    vehicleDb = originalVehicleDb;
    dutyVehicleDb = originalDutyVehicleDb;
    dutyHardnessDb = originalDutyHardnessDb;
    mode = originalMode;
  }
}

  await loadExternalData();

  // ↓ここに追加（この位置）

initializeApp();
